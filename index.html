<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; font-family: sans-serif; }
        .bg-gradient { background: radial-gradient(circle at 50% -20%, #2e1065, #000); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-gradient text-white min-h-screen flex items-center justify-center p-6">

    <div id="landing-view" class="text-center">
        <h1 class="text-7xl font-black italic tracking-tighter text-fuchsia-600 mb-4 uppercase">Socialize</h1>
        <p class="text-zinc-400 mb-10 tracking-widest text-xs uppercase font-bold">Your custom digital footprint</p>
        <button id="login-btn" class="bg-white text-black font-black px-12 py-5 rounded-full hover:bg-fuchsia-500 hover:text-white transition-all duration-300 shadow-2xl shadow-fuchsia-500/20">
            MAKE YOUR PROFILE
        </button>
    </div>

    <div id="profile-view" class="hidden glass max-w-sm w-full p-10 rounded-[40px] text-center">
        <img id="user-photo" src="" class="w-24 h-24 rounded-full mx-auto mb-6 border-2 border-fuchsia-600 p-1">
        <h2 id="user-name" class="text-3xl font-black italic mb-2"></h2>
        <p id="user-bio" class="text-zinc-400 text-sm leading-relaxed mb-8"></p>
        <div class="py-4 px-6 bg-zinc-900/50 rounded-2xl text-xs font-bold text-zinc-500 uppercase tracking-widest">
            More Links Coming Soon
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
