<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white flex items-center justify-center min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center font-black italic text-fuchsia-600">LOADING...</div>

    <div class="w-full max-w-sm p-6 space-y-6 text-center">
        <h1 class="text-5xl font-black italic text-fuchsia-600 uppercase">Socialize</h1>
        <div class="space-y-3">
            <input type="email" id="email" placeholder="Email" class="w-full bg-zinc-900 p-4 rounded-2xl outline-none border border-white/5">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-zinc-900 p-4 rounded-2xl outline-none border border-white/5">
        </div>
        <button id="btn-login" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-xs">Login</button>
        <button id="btn-google" class="w-full bg-fuchsia-600 py-4 rounded-2xl font-black uppercase text-xs">Google Access</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if(user) { window.location.href = 'hub.html'; }
            else { document.getElementById('loading-screen').classList.add('hidden'); }
        });

        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
</body>
</html>
