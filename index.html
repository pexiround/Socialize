<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; transition: 0.5s; }
        .theme-midnight { background: #080808; color: white; }
        .theme-glass { background: radial-gradient(circle at top, #2e1065, #000); color: white; }
        .theme-neon { background: #000; color: #f0f; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="theme-midnight p-6">

    <div id="landing-view" class="text-center">
        <h1 class="text-7xl font-black italic tracking-tighter text-fuchsia-600 uppercase mb-4">Socialize</h1>
        <p id="global-counter" class="flex items-center justify-center text-[10px] font-bold tracking-[0.3em] text-zinc-500 mb-10"></p>
        <button id="login-btn" class="bg-white text-black font-black px-12 py-5 rounded-full active:scale-95 transition">GET STARTED</button>
    </div>

    <div id="profile-view" class="hidden w-full max-w-[380px] glass-card p-10 rounded-[3rem] text-center animate-in fade-in zoom-in duration-500">
        <img id="user-photo" src="" class="w-24 h-24 rounded-full mx-auto mb-6 border-2 border-fuchsia-600 p-1">
        <h2 id="user-name" class="text-3xl font-black flex items-center justify-center italic tracking-tighter"></h2>
        <p id="user-bio" class="text-zinc-400 text-sm mt-4 leading-relaxed"></p>
        <div class="mt-8 pt-8 border-t border-white/5">
            <div class="py-3 bg-white/5 rounded-xl text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Links coming soon</div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
