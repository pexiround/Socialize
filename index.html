<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socialize</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; transition: background 0.8s ease; overflow-x: hidden; }
        .theme-midnight { background: #000; color: white; }
        .theme-neon { background: #000; color: #f0f; text-shadow: 0 0 15px #f0f; }
        .theme-glass { background: linear-gradient(135deg, #1a1a1a 0%, #2e1065 100%); color: white; }
        
        .pulse-bg { position: fixed; inset: 0; background: radial-gradient(circle at center, #7c3aed20 0%, transparent 70%); animation: pulse 6s infinite; z-index: -1; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
        
        .mobile-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="theme-midnight flex items-center justify-center min-h-screen p-6">
    <div class="pulse-bg"></div>

    <div id="landing-view" class="text-center w-full max-w-xs">
        <h1 class="text-7xl font-black italic tracking-tighter text-fuchsia-600 uppercase mb-2">Socialize</h1>
        <p id="global-counter" class="text-[10px] tracking-[0.5em] font-bold text-zinc-600 mb-12 uppercase italic">CONNECTING...</p>
        <button id="login-btn" class="w-full bg-white text-black font-black py-5 rounded-[2rem] hover:scale-105 active:scale-95 transition-all shadow-2xl">
            GET STARTED
        </button>
    </div>

    <div id="profile-view" class="hidden w-full max-w-sm mobile-card p-10 rounded-[3.5rem] text-center shadow-2xl">
        <img id="user-photo" src="" class="w-28 h-28 rounded-full mx-auto mb-6 border-4 border-fuchsia-600 p-1">
        <h2 id="user-name" class="text-4xl font-black italic uppercase tracking-tighter mb-4"></h2>
        <p id="user-bio" class="text-zinc-400 text-sm leading-relaxed font-medium mb-10"></p>
        <div class="py-4 bg-white/5 rounded-2xl text-[10px] uppercase font-bold tracking-widest text-zinc-500">Links Locked</div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
