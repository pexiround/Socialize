<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; overflow-x: hidden; }
        .gradient-bg { background: radial-gradient(circle at 50% 50%, #2e1065 0%, #000 70%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="gradient-bg text-white min-h-screen flex items-center justify-center font-sans">

    <div id="landing-view" class="text-center px-4">
        <h1 class="text-8xl font-black italic tracking-tighter text-fuchsia-600 mb-2 uppercase drop-shadow-[0_0_30px_rgba(192,38,211,0.4)]">Socialize</h1>
        <p class="text-zinc-500 tracking-[0.3em] text-[10px] uppercase font-bold mb-12">Your Digital Identity in Seconds</p>
        <button id="login-btn" class="bg-white text-black font-black px-14 py-5 rounded-full hover:scale-105 transition-all shadow-xl active:scale-95">
            MAKE YOUR PROFILE
        </button>
    </div>

    <div id="profile-view" class="hidden glass max-w-sm w-full p-12 rounded-[50px] text-center mx-4">
        <img id="user-photo" src="" class="w-28 h-28 rounded-full mx-auto mb-6 border-4 border-fuchsia-600 shadow-lg">
        <h2 id="user-name" class="text-3xl font-black italic mb-3 uppercase tracking-tight"></h2>
        <p id="user-bio" class="text-zinc-400 text-sm leading-relaxed mb-10 font-medium"></p>
        <div class="p-4 bg-white/5 rounded-2xl border border-white/5 text-[10px] uppercase tracking-widest text-zinc-500 font-bold">
            Social Links Locked
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
