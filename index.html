<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Your Digital Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div id="landing" class="text-center p-6">
        <h1 class="text-7xl font-black italic tracking-tighter text-fuchsia-600 mb-4">SOCIALIZE</h1>
        <p class="text-zinc-400 mb-8">Create your custom link profile in seconds.</p>
        <button id="login-btn" class="bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-fuchsia-500 transition">
            MAKE YOUR PROFILE
        </button>
    </div>

    <div id="profile" class="hidden w-full max-w-md p-8 text-center">
        <img id="p-img" src="" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-fuchsia-500">
        <h2 id="p-name" class="text-3xl font-bold mb-2"></h2>
        <p id="p-bio" class="text-zinc-400 mb-8"></p>
        <div id="p-links" class="space-y-4"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
