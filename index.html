<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize Academy | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white h-screen flex items-center justify-center p-6 font-sans">
    <div class="w-full max-w-sm text-center space-y-8">
        <div>
            <h1 class="text-5xl font-black italic text-fuchsia-600 tracking-tighter">SOCIALIZE</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] mt-2 font-bold">Code Academy</p>
        </div>
        <button onclick="login()" class="w-full bg-white text-black py-5 rounded-[24px] font-black uppercase text-xs flex items-center justify-center gap-3 hover:scale-[1.02] transition-transform">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_inc_64.png" class="w-5 h-5"> Continue with Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.login = async () => {
            const res = await signInWithPopup(auth, new GoogleAuthProvider());
            const userRef = doc(db, "users", res.user.uid);
            const d = await getDoc(userRef);
            if (!d.exists()) {
                await setDoc(userRef, { name: res.user.displayName, points: 100, level: 1, isVerified: false });
            }
            window.location.href = 'hub.html';
        };
    </script>
</body>
</html>
