<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .input-box { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-sm space-y-8 text-center">
        <div>
            <h1 class="text-4xl font-black italic text-fuchsia-600 tracking-tighter">SOCIALIZE</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mt-2">AI Coding Academy</p>
        </div>

        <div class="space-y-3">
            <button onclick="processGoogle()" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2 hover:bg-zinc-200 transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_inc_64.png" class="w-4 h-4"> Continue with Google
            </button>
            <p class="text-[9px] text-zinc-600 px-6 uppercase font-bold tracking-widest leading-relaxed">
                By signing in, you agree to our <span class="text-white underline">Learning Privacy Policy</span>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.processGoogle = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                const userRef = doc(db, "users", res.user.uid);
                const d = await getDoc(userRef);
                if (!d.exists()) {
                    await setDoc(userRef, { name: res.user.displayName, points: 0, level: 1, isVerified: false });
                }
                window.location.href = 'hub.html';
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
