<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID WALKER | Alpha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* UI Overlay */
        #ui-wrapper {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: rgba(255,255,255,0.5);
            border-radius: 50%; transform: translate(-50%, -50%);
        }

        /* Menu System */
        #menu {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: 0.3s;
        }

        .btn {
            background: none; border: 2px solid #fff; color: #fff;
            padding: 15px 40px; font-size: 20px; font-family: 'Orbitron';
            cursor: pointer; transition: 0.2s; margin: 10px; text-transform: uppercase;
        }

        .btn:hover { background: #fff; color: #000; }
        
        #stats { padding: 20px; color: #0f0; font-size: 12px; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color:white; letter-spacing: 10px; margin-bottom: 50px;">VOID_WALKER</h1>
        <button class="btn" id="start-btn">DEPLOY TO VOID</button>
        <p style="color: #666; font-size: 12px;">WASD - MOVE | SPACE - JUMP | ESC - MENU</p>
    </div>

    <div id="ui-wrapper">
        <div id="stats">SYSTEM_STATUS: ONLINE<br>LATENCY: 12ms</div>
        <div id="crosshair"></div>
        <div></div> </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        // --- ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- WORLD OBJECTS ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambient);

        const sun = new THREE.PointLight(0x00ffff, 1, 100);
        sun.position.set(5, 10, 5);
        sun.castShadow = true;
        scene.add(sun);

        // Grid Baseplate
        const size = 200;
        const divisions = 100;
        const grid = new THREE.GridHelper(size, divisions, 0x00ffff, 0x222222);
        scene.add(grid);

        const floorGeo = new THREE.PlaneGeometry(size, size);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- PLAYER RIG ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), bodyMat);
        torso.position.y = 1.1;
        torso.castShadow = true;
        playerGroup.add(torso);

        const legGeo = new THREE.BoxGeometry(0.15, 0.7, 0.15);
        const leftLeg = new THREE.Mesh(legGeo, bodyMat);
        leftLeg.position.set(-0.15, 0.4, 0);
        playerGroup.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeo, bodyMat);
        rightLeg.position.set(0.15, 0.4, 0);
        playerGroup.add(rightLeg);

        // --- CONTROLS & PHYSICS ---
        const controls = new PointerLockControls(camera, document.body);
        const startBtn = document.getElementById('start-btn');
        const menu = document.getElementById('menu');

        startBtn.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => menu.style.opacity = '0');
        controls.addEventListener('unlock', () => menu.style.opacity = '1');

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 15; canJump = false; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // --- GAME LOOP ---
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                // Physics deceleration
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 4.0 * delta; // Gravity

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                camera.position.y += (velocity.y * delta);

                if (camera.position.y < 1.7) {
                    velocity.y = 0;
                    camera.position.y = 1.7;
                    canJump = true;
                }

                // Sync Body
                playerGroup.position.copy(camera.position);
                playerGroup.position.y -= 1.7; // Align feet to floor
                
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                playerGroup.rotation.y = Math.atan2(camDir.x, camDir.z);

                // View Bobbing & Leg Animation
                const isMoving = moveForward || moveBackward || moveLeft || moveRight;
                if (isMoving && canJump) {
                    const walkCycle = time * 0.01;
                    // Head Bob
                    camera.position.y += Math.sin(walkCycle * 0.8) * 0.02;
                    // Leg Swing
                    leftLeg.position.z = Math.sin(walkCycle) * 0.3;
                    rightLeg.position.z = -Math.sin(walkCycle) * 0.3;
                    leftLeg.position.y = 0.4 + Math.abs(Math.cos(walkCycle)) * 0.1;
                    rightLeg.position.y = 0.4 + Math.abs(Math.sin(walkCycle)) * 0.1;
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
