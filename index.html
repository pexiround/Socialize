<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0b0b; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .steam-card { background: rgba(23, 26, 33, 0.95); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 450px; overflow: hidden; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header-bg { height: 120px; background: linear-gradient(to bottom, #4c6b22, #171a21); position: relative; }
        .avatar-container { position: relative; margin-top: -60px; display: flex; justify-content: center; }
        .pfp-frame { width: 110px; height: 110px; border-radius: 4px; border: 3px solid #3a3a3a; padding: 2px; background: #171a21; }
    </style>
</head>
<body class="p-6">

    <div id="landing-view" class="text-center">
        <h1 class="text-6xl font-black italic text-fuchsia-600 mb-2 uppercase tracking-tighter">Socialize</h1>
        <p id="global-counter" class="flex items-center justify-center text-[10px] font-bold text-zinc-500 tracking-[0.3em] mb-12 uppercase"></p>
        <button id="login-btn" class="bg-white text-black font-black px-12 py-4 rounded-sm hover:bg-zinc-200 transition active:scale-95">LOG IN WITH GOOGLE</button>
    </div>

    <div id="profile-view" class="hidden steam-card animate-in fade-in zoom-in duration-500">
        <div class="header-bg"></div>
        <div class="avatar-container">
            <img id="user-photo" src="" class="pfp-frame object-cover">
        </div>
        <div class="p-8 pt-4 text-center">
            <h2 id="user-name" class="text-2xl font-bold flex items-center justify-center"></h2>
            <p id="lvl-display" class="text-blue-400 text-xs font-bold uppercase mt-1"></p>
            <div class="bg-black/30 p-4 rounded mt-6 border border-white/5">
                <p id="user-bio" class="text-zinc-400 text-sm italic leading-relaxed"></p>
            </div>
            <div class="mt-8">
                <button onclick="location.href='index.html'" class="text-[10px] text-zinc-600 hover:text-white uppercase font-bold tracking-widest">Create Your Own Profile</button>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
