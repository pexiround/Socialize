<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Enter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .hero-glow { background: radial-gradient(circle at center, rgba(217, 70, 239, 0.15) 0%, transparent 70%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 hero-glow">
    <div class="w-full max-w-sm space-y-8 text-center">
        <div>
            <h1 class="text-6xl font-black italic text-fuchsia-600 uppercase tracking-tighter">Socialize</h1>
            <p class="text-zinc-500 text-[10px] font-bold tracking-[0.5em] mt-2 uppercase">The New Era of Connection</p>
        </div>

        <div class="space-y-3">
            <input type="email" id="email" placeholder="Email Address" class="w-full bg-zinc-900/50 p-5 rounded-3xl outline-none border border-white/5 focus:border-fuchsia-600 transition-all text-sm">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-zinc-900/50 p-5 rounded-3xl outline-none border border-white/5 focus:border-fuchsia-600 transition-all text-sm">
        </div>

        <div class="space-y-3">
            <button id="btn-login" class="w-full bg-white text-black py-5 rounded-3xl font-black uppercase text-xs tracking-widest hover:scale-[1.02] active:scale-95 transition">Login</button>
            <button id="btn-signup" class="w-full bg-zinc-900 text-white py-5 rounded-3xl font-black uppercase text-xs tracking-widest border border-white/10">Create Account</button>
        </div>

        <div class="relative py-4">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-white/10"></span></div>
            <span class="relative bg-[#050505] px-4 text-[10px] text-zinc-600 font-bold uppercase">Quick Access</span>
        </div>

        <button id="btn-google" class="w-full bg-fuchsia-600/10 border border-fuchsia-600/20 text-fuchsia-500 py-4 rounded-3xl font-black uppercase text-[10px] tracking-widest hover:bg-fuchsia-600 hover:text-white transition">Continue with Google</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => { if(user) window.location.href = 'hub.html'; });

        document.getElementById('btn-signup').onclick = () => createUserWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
</body>
</html>
