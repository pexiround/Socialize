<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #0a0a0a; font-family: 'VT323', monospace; color: white; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="bg-zinc-900 p-8 rounded-3xl border-4 border-zinc-800 w-80 text-center">
        <h1 class="text-4xl text-fuchsia-500 mb-6">SOCIALIZE</h1>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="EMAIL" class="w-full bg-black p-3 border-2 border-zinc-700 outline-none focus:border-fuchsia-500">
            <input id="pass" type="password" placeholder="PASSWORD" class="w-full bg-black p-3 border-2 border-zinc-700 outline-none focus:border-fuchsia-500">
            <button onclick="login()" class="w-full bg-fuchsia-600 p-3 text-xl hover:bg-fuchsia-500">LOGIN</button>
            <button onclick="signup()" class="text-zinc-500 text-sm">CREATE ACCOUNT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = () => {
            signInWithEmailAndPassword(auth, email.value, pass.value)
                .then(() => window.location.href = "hub.html")
                .catch(e => alert(e.message));
        };

        window.signup = () => {
            createUserWithEmailAndPassword(auth, email.value, pass.value)
                .then(() => window.location.href = "hub.html")
                .catch(e => alert(e.message));
        };
    </script>
</body>
</html>
