<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-sm space-y-6">
        <div class="text-center">
            <h1 class="text-4xl font-black italic text-fuchsia-600 uppercase">Socialize</h1>
            <p class="text-zinc-500 text-[10px] font-bold tracking-widest mt-2 uppercase">Connect. Chat. Earn.</p>
        </div>

        <div class="space-y-3">
            <input type="email" id="email" placeholder="Email" class="w-full bg-zinc-900 p-4 rounded-2xl outline-none border border-white/5 focus:border-fuchsia-600 transition">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-zinc-900 p-4 rounded-2xl outline-none border border-white/5 focus:border-fuchsia-600 transition">
        </div>

        <div class="flex gap-2">
            <button id="btn-login" class="flex-1 bg-white text-black py-4 rounded-2xl font-black uppercase text-xs">Login</button>
            <button id="btn-signup" class="flex-1 bg-zinc-800 text-white py-4 rounded-2xl font-black uppercase text-xs">Sign Up</button>
        </div>

        <div class="relative py-4">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-white/10"></span></div>
            <div class="relative flex justify-center text-[10px] uppercase font-bold text-zinc-600"><span class="bg-[#050505] px-4">Instant Access</span></div>
        </div>

        <button id="btn-google" class="w-full bg-fuchsia-600 py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-3">
            Continue with Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => { if(user) window.location.href = 'editor.html'; });

        document.getElementById('btn-signup').onclick = () => createUserWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
</body>
</html>
