<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080808; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .steam-card { background: #171a21; width: 100%; max-width: 400px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .header-strip { height: 100px; background: linear-gradient(to bottom, #4c6b22, #171a21); }
        .pfp-wrap { width: 100px; height: 100px; margin-top: -50px; border: 4px solid #171a21; background: #000; border-radius: 4px; }
    </style>
</head>
<body class="p-6">

    <div id="landing-view" class="text-center">
        <h1 class="text-7xl font-black italic text-fuchsia-600 tracking-tighter uppercase mb-4">Socialize</h1>
        <p id="global-counter" class="flex items-center justify-center text-[10px] font-bold text-zinc-600 mb-12 tracking-widest"></p>
        <button id="login-btn" class="bg-white text-black font-black px-12 py-5 rounded-sm active:scale-95 transition">GET STARTED</button>
    </div>

    <div id="profile-view" class="hidden steam-card shadow-2xl animate-in fade-in zoom-in duration-500">
        <div class="header-strip"></div>
        <div class="flex justify-center"><img id="user-photo" src="" class="pfp-wrap object-cover"></div>
        <div class="p-8 pt-4 text-center">
            <h2 id="user-name" class="text-2xl font-bold flex items-center justify-center italic"></h2>
            <p id="lvl-display" class="text-blue-400 text-[10px] font-black uppercase mt-1"></p>
            <div class="bg-black/40 p-5 rounded mt-6 border border-white/5">
                <p id="user-bio" class="text-zinc-400 text-sm leading-relaxed italic"></p>
            </div>
            <button onclick="location.href='index.html'" class="mt-10 text-[9px] text-zinc-700 hover:text-white uppercase font-black tracking-[0.3em]">Build Your Identity</button>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
