<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | My Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white flex flex-col items-center p-10 min-h-screen">

    <div id="profile" class="text-center mb-8">
        <img id="user-img" src="" class="w-24 h-24 rounded-full border-4 border-fuchsia-500 mx-auto mb-4 object-cover">
        <h1 id="user-name" class="text-3xl font-bold italic uppercase tracking-tighter">Loading...</h1>
        <p id="user-bio" class="text-zinc-500 mt-2"></p>
    </div>

    <div id="links-container" class="w-full max-w-sm space-y-4">
        </div>

    <script>
        // Fetch the links from the JSON file
        fetch('links.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('user-name').innerText = data.name;
                document.getElementById('user-bio').innerText = data.bio;
                document.getElementById('user-img').src = data.profile_pic;

                const container = document.getElementById('links-container');
                data.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.className = "block bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center font-bold hover:scale-105 transition-transform hover:bg-zinc-800";
                    a.innerHTML = `<span class="mr-2">${link.icon}</span> ${link.title}`;
                    container.appendChild(a);
                });
            });
    </script>
</body>
</html>
