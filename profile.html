<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080808; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .steam-card { background: #171a21; width: 100%; max-width: 400px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); }
        .header-strip { height: 120px; background: linear-gradient(to bottom, #4c6b22, #0b0b0b); }
        .pfp-wrap { width: 110px; height: 110px; margin-top: -55px; border: 4px solid #171a21; background: #000; border-radius: 4px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="p-6">

    <div class="steam-card">
        <div class="header-strip"></div>
        <div class="flex justify-center">
            <img id="user-photo" src="" class="pfp-wrap object-cover">
        </div>
        <div class="p-8 pt-4 text-center">
            <h2 id="user-name" class="text-2xl font-bold flex items-center justify-center italic tracking-tight"></h2>
            <p id="lvl-display" class="text-blue-400 text-[10px] font-black uppercase mt-1 tracking-widest"></p>
            <div class="bg-black/40 p-5 rounded mt-6 border border-white/5 text-left shadow-inner">
                <p id="user-bio" class="text-zinc-400 text-sm leading-relaxed italic"></p>
            </div>
            <button onclick="location.href='index.html'" class="mt-8 text-[9px] text-zinc-600 hover:text-white uppercase font-black tracking-[0.2em] transition">Create Your Profile</button>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
