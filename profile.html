<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Socialize | View Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080808; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .p-card { background: #121212; border: 1px solid rgba(255,255,255,0.05); width: 100%; max-width: 380px; border-radius: 40px; padding: 40px; text-align: center; }
        .loading { animate: pulse 1s infinite; }
        .frame-neon { border: 4px solid #d946ef; box-shadow: 0 0 30px #d946ef; }
        .frame-gold { border: 4px solid #fbbf24; box-shadow: 0 0 30px #fbbf24; }
        .frame-emerald { border: 4px solid #10b981; box-shadow: 0 0 30px #10b981; }
        .frame-void { border: 4px solid #6366f1; border-style: dashed; }
    </style>
</head>
<body>
    <div id="loader" class="text-fuchsia-600 font-black animate-pulse">LOADING PROFILE...</div>
    
    <div id="main-content" class="hidden p-card">
        <div id="f-box" class="w-32 h-32 mx-auto rounded-3xl overflow-hidden mb-6 transition-all">
            <img id="p-img" src="" class="w-full h-full object-cover">
        </div>
        <h1 id="p-name" class="text-3xl font-black italic tracking-tighter"></h1>
        <p id="p-title" class="text-[10px] font-black uppercase tracking-[0.4em] text-fuchsia-600 mt-2 mb-6"></p>
        <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
            <p id="p-bio" class="text-zinc-400 text-sm italic"></p>
        </div>
        <button onclick="location.href='index.html'" class="mt-8 text-[9px] text-zinc-600 font-black uppercase tracking-widest">Create Profile</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const uid = params.get('u');

        if(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('p-name').innerText = d.name || "User";
                document.getElementById('p-bio').innerText = d.bio || "The founder of this profile is mysterious.";
                document.getElementById('p-title').innerText = d.equippedTitle?.replace('title-', '') || "";
                document.getElementById('f-box').className = `w-32 h-32 mx-auto rounded-3xl overflow-hidden mb-6 ${d.equippedFrame || 'frame-none'}`;
                // Using DiceBear as a fallback because Firestore doesn't store the Google PFP by default
                document.getElementById('p-img').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${uid}`;
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                document.getElementById('loader').innerText = "USER NOT FOUND";
            }
        }
    </script>
</body>
</html>
