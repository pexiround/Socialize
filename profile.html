<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Socialize | View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080808; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .p-card { background: #121212; border: 1px solid rgba(255,255,255,0.05); width: 380px; border-radius: 40px; padding: 40px; text-align: center; }
        .frame-neon { border: 4px solid #d946ef; box-shadow: 0 0 30px #d946ef; }
        .frame-gold { border: 4px solid #fbbf24; box-shadow: 0 0 30px #fbbf24; }
        .frame-emerald { border: 4px solid #10b981; box-shadow: 0 0 30px #10b981; }
        .frame-void { border: 4px solid #6366f1; border-style: dashed; }
    </style>
</head>
<body>
    <div id="loader" class="text-fuchsia-600 font-black animate-pulse">CONNECTING...</div>
    
    <div id="content" class="hidden p-card">
        <div id="f-box" class="w-32 h-32 mx-auto rounded-3xl overflow-hidden mb-6">
            <img id="p-img" src="" class="w-full h-full object-cover">
        </div>
        <h1 id="p-name" class="text-3xl font-black italic flex justify-center items-center gap-2"></h1>
        <p id="p-title" class="text-[10px] font-black uppercase tracking-[0.4em] text-fuchsia-600 mt-2 mb-6"></p>
        <div class="bg-white/5 p-6 rounded-3xl border border-white/5"><p id="p-bio" class="text-zinc-400 text-sm italic"></p></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const db = getFirestore(initializeApp(firebaseConfig));
        const uid = new URLSearchParams(window.location.search).get('u');

        if(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('p-name').innerHTML = (d.name || "User") + (d.isVerified ? ' <span class="material-icons text-blue-500 text-sm">verified</span>' : '');
                document.getElementById('p-bio').innerText = d.bio || "No bio set.";
                document.getElementById('p-title').innerText = d.equippedTitle?.split('-')[1] || "";
                document.getElementById('f-box').className = `w-32 h-32 mx-auto rounded-3xl overflow-hidden mb-6 ${d.equippedFrame || ''}`;
                document.getElementById('p-img').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${uid}`;
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } else { document.getElementById('loader').innerText = "404: USER NOT FOUND"; }
        }
    </script>
</body>
</html>
