<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | 2D World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111; color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: 'Inter', sans-serif;}
        canvas { background: #333; display: block; image-rendering: pixelated; margin: 20px auto; }
        .hud { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="hud flex justify-between items-center bg-black/50">
        <h1 class="text-xs font-black italic text-fuchsia-600">SOCIALIZE / 2D</h1>
        <div class="flex gap-4">
            <p id="ui-dirt" class="text-xs text-orange-400 font-bold">DIRT: 0</p>
            <p id="ui-stone" class="text-xs text-zinc-400 font-bold">STONE: 0</p>
            <p class="text-xs text-zinc-600 font-bold">[M] SPAWN MINER (20 DIRT)</p>
        </div>
    </div>

    <canvas id="game" width="400" height="240"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('ctx2d');
        const TILE_SIZE = 16;
        const MAP_W = Math.floor(canvas.width / TILE_SIZE);
        const MAP_H = Math.floor(canvas.height / TILE_SIZE);

        // -- DATA LAYER (Firebase placeholder) --
        let player = { x: 300, y: 100, vx: 0, vy: 0, w: 16, h: 24, inv: { dirt: 0, stone: 0 } };
        let worldMap = []; // A 2D array [row][col]
        let miners = []; // List of miner objects

        // -- PIXEL ART ASSETS (Simple Colors for now) --
        const tiles = {
            '0': null,       // SKY
            '1': '#2d5a27',  // GRASS
            '2': '#5d3a1a',  // DIRT
            '3': '#7a7a7a'   // STONE (Deeper)
        };

        // --- LEVEL 1: THE GENERATOR ---
        function generateMap() {
            worldMap = [];
            for (let r = 0; r < MAP_H; r++) {
                worldMap[r] = [];
                for (let c = 0; c < MAP_W; c++) {
                    let tile = '0'; // Default Sky
                    if (r === MAP_H - 4) tile = '1';       // Grass layer
                    else if (r > MAP_H - 4 && r < MAP_H) tile = '2'; // Dirt layer
                    else if (r >= MAP_H) tile = '3';       // Stone layer (below screen)
                    worldMap[r][c] = tile;
                }
            }
        }

        // --- THE RENDER LOOP (The "Camera") ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear screen

            // Draw World
            for (let r = 0; r < MAP_H; r++) {
                for (let c = 0; c < MAP_W; c++) {
                    const tile = worldMap[r][c];
                    if (tile !== '0') {
                        ctx.fillStyle = tiles[tile];
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        
                        // Pixel Art Details
                        if(tile === '1') { // Grassy tufts
                            ctx.fillStyle = '#4a8e3d'; ctx.fillRect(c * TILE_SIZE + 4, r * TILE_SIZE + 2, 2, 2); ctx.fillRect(c * TILE_SIZE + 10, r * TILE_SIZE + 4, 2, 2);
                        } else if(tile === '2') { // Speckles in dirt
                            ctx.fillStyle = '#3a2118'; ctx.fillRect(c * TILE_SIZE + 6, r * TILE_SIZE + 8, 2, 2);
                        }
                    }
                }
            }

            // Draw Miners
            miners.forEach(m => {
                ctx.fillStyle = '#3b82f6'; // Blue Miner
                ctx.fillRect(m.x, m.y, 16, 16);
                ctx.fillStyle = '#1e3d1a'; // Antenna
                ctx.fillRect(m.x + 6, m.y - 4, 4, 4);
                // Mining effect
                ctx.fillStyle = m.digging ? '#d946ef' : '#555'; ctx.fillRect(m.x + 6, m.y + 16, 4, 4);
            });

            // Draw Player (The Pixel Character from your image)
            // Head
            ctx.fillStyle = '#ffd1aa'; ctx.fillRect(player.x + 4, player.y, 8, 10);
            // Face
            ctx.fillStyle = '#000'; ctx.fillRect(player.x + 6, player.y + 4, 1, 1); ctx.fillRect(player.x + 9, player.y + 4, 1, 1);
            // Multi-color shirt
            ctx.fillStyle = '#d946ef'; ctx.fillRect(player.x + 2, player.y + 10, 4, 8); // Pink
            ctx.fillStyle = '#22d3ee'; ctx.fillRect(player.x + 6, player.y + 10, 4, 8); // Cyan
            ctx.fillStyle = '#6366f1'; ctx.fillRect(player.x + 10, player.y + 10, 4, 8); // Indigo
            // Pants/Shoes
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(player.x + 4, player.y + 18, 8, 6); // Boots

            updateUI();
        }

        function updateUI() {
            document.getElementById('ui-dirt').innerText = `DIRT: ${player.inv.dirt}`;
            document.getElementById('ui-stone').innerText = `STONE: ${player.inv.stone}`;
        }

        // --- LEVEL 2: PHYSICS & INPUT ---
        function update() {
            // APPLY PHYSICS
            player.vy += 1; // Gravity (increases every frame)
            
            // Move player
            player.x += player.vx;
            player.y += player.vy;

            // Simple Collision (Keep on the grass)
            const ground_y = (MAP_H - 4) * TILE_SIZE - player.h;
            if (player.y > ground_y) {
                player.y = ground_y;
                player.vy = 0;
            }

            // Simple Friction (slow horizontal movement)
            player.vx *= 0.8; 

            // Update Miners
            miners.forEach(m => {
                m.timer++;
                m.digging = m.timer > 30 && m.timer < 50; // Visual digging state
                
                if (m.timer > 60) { // Every 1 second
                    m.timer = 0;
                    // Logic: You get resources, but the world map doesn't change
                    // "Imagine they are digging deep into the ground"
                    if(Math.random() < 0.2) { player.inv.dirt++; player.inv.stone++; } // Gain resources
                    else { player.inv.dirt++; } // Gain resources
                }
            });
        }

        // --- INPUT ---
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'd') player.vx = 8;
            if (e.key === 'ArrowLeft' || e.key === 'a') player.vx = -8;
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.vy === 0) player.vy = -15; // JUMP
            if (e.key === 'm') spawnMiner(); // Spawn Miner
        });

        function spawnMiner() {
            if (player.inv.dirt < 20) return alert("You need 20 DIRT to spawn a Miner Drone!");
            player.inv.dirt -= 20;
            // Spawn a miner right where the player is
            miners.push({ x: player.x, y: player.y, timer: 0, digging: false });
        }

        // --- THE GAME LOOP (60 Frames Per Second) ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start
        generateMap();
        gameLoop();
    </script>
</body>
</html>
