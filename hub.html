<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socialize | The Ascent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Inter', sans-serif; }
        .ctrl-overlay { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; pointer-events: none; }
        .joy-zone { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; pointer-events: auto; border: 2px solid rgba(255,255,255,0.2); }
        .knob { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .grab-btn { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; transition: 0.1s; }
        .grab-btn.active { background: #f00; border-color: #f00; transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="ui" class="fixed top-5 left-5 text-white bg-black/50 p-3 rounded-lg pointer-events-none">
        <p class="text-xs font-black italic text-fuchsia-500">SOCIALIZE CLIMB</p>
        <p id="height-text" class="text-xl font-bold">HEIGHT: 0m</p>
    </div>

    <div class="ctrl-overlay">
        <div class="flex flex-col items-center gap-4">
            <div id="joy-l" class="joy-zone"><div id="knob-l" class="knob"></div></div>
            <button id="btn-l" class="grab-btn">L</button>
        </div>
        <div class="flex flex-col items-center gap-4">
            <div id="joy-r" class="joy-zone"><div id="knob-r" class="knob"></div></div>
            <button id="btn-r" class="grab-btn">R</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, heightText;
        let leftHand, rightHand, body, grips = [];
        let state = {
            l: { x: 0, y: 0, grabbing: false, attachedTo: null },
            r: { x: 0, y: 0, grabbing: false, attachedTo: null }
        };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(light);

            // Create Wall & Grips
            const wallGeo = new THREE.PlaneGeometry(10, 100);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.z = -1;
            scene.add(wall);

            for (let i = 0; i < 50; i++) {
                const gripGeo = new THREE.SphereGeometry(0.15);
                const gripMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
                const grip = new THREE.Mesh(gripGeo, gripMat);
                grip.position.set((Math.random() - 0.5) * 4, i * 1.5, -0.8);
                scene.add(grip);
                grips.push(grip);
            }

            // Create Player Parts
            const handGeo = new THREE.SphereGeometry(0.2);
            leftHand = new THREE.Mesh(handGeo, new THREE.MeshStandardMaterial({ color: 0x00ffff }));
            rightHand = new THREE.Mesh(handGeo, new THREE.MeshStandardMaterial({ color: 0x00ffff }));
            body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), new THREE.MeshStandardMaterial({ color: 0xf0f }));
            
            scene.add(leftHand, rightHand, body);

            setupControls();
        }

        function setupControls() {
            const handleJoy = (id, side) => {
                const zone = document.getElementById(id);
                const knob = document.getElementById('knob-' + side);
                zone.addEventListener('touchmove', (e) => {
                    const rect = zone.getBoundingClientRect();
                    const touch = e.touches[0];
                    let dx = (touch.clientX - (rect.left + 60)) / 60;
                    let dy = (touch.clientY - (rect.top + 60)) / 60;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist > 1) { dx /= dist; dy /= dist; }
                    knob.style.transform = `translate(${dx * 40}px, ${dy * 40}px)`;
                    state[side].x = dx; state[side].y = -dy;
                });
                zone.addEventListener('touchend', () => {
                    knob.style.transform = 'translate(0,0)';
                    state[side].x = 0; state[side].y = 0;
                });
            };

            handleJoy('joy-l', 'l'); handleJoy('joy-r', 'r');

            const setupBtn = (side) => {
                const btn = document.getElementById('btn-' + side);
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    state[side].grabbing = true;
                    btn.classList.add('active');
                    checkGrip(side);
                });
                btn.addEventListener('touchend', () => {
                    state[side].grabbing = false;
                    state[side].attachedTo = null;
                    btn.classList.remove('active');
                });
            };
            setupBtn('l'); setupBtn('r');
        }

        function checkGrip(side) {
            const hand = side === 'l' ? leftHand : rightHand;
            grips.forEach(g => {
                if (hand.position.distanceTo(g.position) < 0.4) {
                    state[side].attachedTo = g.position.clone();
                    g.material.color.set(0x00ff00);
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // 1. Move hands relative to body
            const targetL = new THREE.Vector3(body.position.x - 0.8 + state.l.x * 1.5, body.position.y + 0.5 + state.l.y * 1.5, 0);
            const targetR = new THREE.Vector3(body.position.x + 0.8 + state.r.x * 1.5, body.position.y + 0.5 + state.r.y * 1.5, 0);

            if (!state.l.attachedTo) leftHand.position.lerp(targetL, 0.1);
            else leftHand.position.copy(state.l.attachedTo);

            if (!state.r.attachedTo) rightHand.position.lerp(targetR, 0.1);
            else rightHand.position.copy(state.r.attachedTo);

            // 2. Physics: If attached, pull body. If not, gravity.
            let gravity = -0.05;
            if (state.l.attachedTo || state.r.attachedTo) {
                gravity = 0;
                // Pulling logic: Calculate center of hands and move body toward it
                let anchor = new THREE.Vector3();
                if (state.l.attachedTo && state.r.attachedTo) {
                    anchor.addVectors(state.l.attachedTo, state.r.attachedTo).multiplyScalar(0.5);
                } else {
                    anchor.copy(state.l.attachedTo || state.r.attachedTo);
                }
                
                // Pull body up toward the grip
                body.position.y = THREE.MathUtils.lerp(body.position.y, anchor.y - 1, 0.05);
                body.position.x = THREE.MathUtils.lerp(body.position.x, anchor.x, 0.05);
            } else {
                body.position.y += gravity;
                if(body.position.y < 0) body.position.y = 0;
            }

            camera.position.y = THREE.MathUtils.lerp(camera.position.y, body.position.y + 2, 0.1);
            document.getElementById('height-text').innerText = `HEIGHT: ${Math.floor(body.position.y)}m`;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
