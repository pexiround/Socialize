<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Valley</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { 
            background: #2d5a27; /* Grass Green */
            color: #fff; 
            font-family: 'VT323', monospace; 
            image-rendering: pixelated;
            user-select: none;
        }

        /* The Game Grid */
        .farm-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 2px; 
            background: #1e3d1a; 
            padding: 4px; 
            border: 4px solid #5d3a1a; /* Wooden border */
            border-radius: 8px;
        }

        .tile { 
            aspect-ratio: 1/1; 
            background: #3e7a37; /* Lighter Grass */
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            transition: background 0.2s;
        }

        .tile:hover { background: #4e8a47; }
        
        /* Tile Types */
        .tile.tilled { background: #5d3a1a; } /* Brown Earth */
        .tile.rock { color: #999; }
        .tile.crop { color: #ffeb3b; animation: sway 3s infinite ease-in-out; }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .inventory-bar {
            background: rgba(0,0,0,0.6);
            backdrop-blur: 5px;
            border-top: 4px solid #5d3a1a;
        }

        .slot {
            width: 50px; height: 50px;
            background: #333;
            border: 2px solid #555;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px;
            position: relative;
        }

        .slot.active { border-color: #ffeb3b; box-shadow: 0 0 10px #ffeb3b; }
        .slot-count { position: absolute; bottom: 0; right: 2px; font-size: 14px; }
    </style>
</head>
<body class="h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-sm flex justify-between items-center bg-[#5d3a1a] p-3 rounded-xl border-2 border-[#3d2a1a] mb-4">
        <h1 class="text-xl tracking-widest text-[#f3e5ab]">SOCIALIZE VALLEY</h1>
        <div class="text-right">
            <p id="ui-money" class="text-yellow-400 text-lg">$0</p>
        </div>
    </div>

    <div id="farm" class="farm-grid w-full max-w-sm shadow-2xl">
        </div>

    <div class="mt-4 text-center">
        <p id="hint-text" class="text-sm text-yellow-100 uppercase italic">Select a tool to work the land</p>
    </div>

    <div class="inventory-bar fixed bottom-0 left-0 right-0 p-4 flex justify-center gap-3">
        <div onclick="selectTool('hoe')" id="tool-hoe" class="slot active">
            <span class="material-icons text-orange-200">architecture</span>
            <span class="text-[8px] absolute top-0 left-1 uppercase">Hoe</span>
        </div>
        <div onclick="selectTool('pick')" id="tool-pick" class="slot">
            <span class="material-icons text-zinc-400">handyman</span>
            <span class="text-[8px] absolute top-0 left-1 uppercase">Pick</span>
        </div>
        <div onclick="selectTool('seed')" id="tool-seed" class="slot">
            <span class="material-icons text-green-400">eco</span>
            <span id="inv-seeds" class="slot-count">5</span>
            <span class="text-[8px] absolute top-0 left-1 uppercase">Seed</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let activeTool = 'hoe';
        let worldData = Array(25).fill('grass'); // Initial state

        // --- GAME ACTIONS ---
        window.selectTool = (tool) => {
            activeTool = tool;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById(`tool-${tool}`).classList.add('active');
        };

        window.interact = async (index) => {
            if(!user) return;
            const tile = worldData[index];
            let updates = {};

            if(activeTool === 'hoe' && tile === 'grass') {
                worldData[index] = 'tilled';
            } else if (activeTool === 'seed' && tile === 'tilled') {
                worldData[index] = 'crop';
                updates.seeds = increment(-1);
            } else if (activeTool === 'pick' && tile === 'crop') {
                worldData[index] = 'tilled';
                updates.money = increment(20);
            }

            // Update Firebase
            await updateDoc(doc(db, "users", user.uid), {
                ...updates,
                farmMap: worldData
            });
        };

        // --- RENDER ---
        function drawFarm() {
            const grid = document.getElementById('farm');
            grid.innerHTML = "";
            worldData.forEach((tile, i) => {
                const div = document.createElement('div');
                div.className = `tile ${tile}`;
                div.onclick = () => interact(i);
                
                if(tile === 'crop') div.innerHTML = '<span class="material-icons text-3xl">grass</span>';
                if(tile === 'rock') div.innerHTML = '<span class="material-icons text-xl">vignette</span>';
                
                grid.appendChild(div);
            });
        }

        // --- SYNC ---
        onAuthStateChanged(auth, u => {
            if(!u) return window.location.href = 'index.html';
            user = u;
            onSnapshot(doc(db, "users", u.uid), s => {
                const d = s.data();
                if(d.farmMap) worldData = d.farmMap;
                document.getElementById('ui-money').innerText = `$${d.money || 0}`;
                document.getElementById('inv-seeds').innerText = d.seeds || 0;
                drawFarm();
            });
        });
    </script>
</body>
</html>
