<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .msg { margin-bottom: 8px; padding: 12px; border-radius: 20px; font-size: 13px; max-width: 80%; }
        .msg-mine { background: #d946ef; margin-left: auto; border-bottom-right-radius: 4px; }
        .msg-theirs { background: #1a1a1a; margin-right: auto; border-bottom-left-radius: 4px; }
        .frame-gold { border: 3px solid #fbbf24; box-shadow: 0 0 10px #fbbf24; }
        .frame-fuchsia { border: 3px solid #d946ef; box-shadow: 0 0 10px #d946ef; }
        .frame-cyan { border: 3px solid #22d3ee; box-shadow: 0 0 10px #22d3ee; }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 flex justify-between items-center app-card">
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-black italic text-fuchsia-600">SOCIALIZE</h1>
            <span id="verified-badge" class="hidden material-icons text-blue-400 text-lg">verified</span>
        </div>
        <p id="ui-points" class="text-yellow-500 font-bold text-[10px] uppercase">0 SP</p>
    </div>

    <div id="main-content" class="flex-1 overflow-y-auto p-6 pb-24">
        
        <div id="view-chat" class="space-y-6">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Discover</h3>
            <div id="users-list" class="space-y-3"></div>
        </div>

        <div id="view-arcade" class="hidden space-y-4">
            <div class="app-card p-6 rounded-[30px] text-center border border-white/5">
                <h2 class="text-lg font-black italic">HIGHER OR LOWER</h2>
                <div class="flex justify-between items-center gap-2 my-6">
                    <div class="flex-1 p-4 bg-zinc-900 rounded-2xl"><p id="game-a" class="text-xs font-bold uppercase">---</p></div>
                    <p class="text-zinc-700 italic font-black text-xs">VS</p>
                    <div class="flex-1 p-4 bg-zinc-900 rounded-2xl"><p id="game-b" class="text-xs font-bold uppercase">---</p></div>
                </div>
                <div class="flex gap-2">
                    <button onclick="guess('higher')" class="flex-1 bg-white text-black py-3 rounded-xl font-black uppercase text-[10px]">Higher</button>
                    <button onclick="guess('lower')" class="flex-1 bg-zinc-800 py-3 rounded-xl font-black uppercase text-[10px]">Lower</button>
                </div>
            </div>
        </div>

        <div id="view-shop" class="hidden space-y-4">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Item Shop</h3>
            <div id="shop-list" class="space-y-3"></div>
        </div>

        <div id="view-settings" class="hidden space-y-6">
            <div class="app-card p-8 rounded-[40px] text-center space-y-4">
                <div id="my-frame" class="w-20 h-20 mx-auto rounded-2xl overflow-hidden bg-zinc-800">
                    <img id="my-pfp" class="w-full h-full">
                </div>
                <h2 id="set-name" class="font-black italic text-xl uppercase">User</h2>
                <button id="btn-logout" class="text-red-600 font-bold uppercase text-[10px] pt-4">Logout Account</button>
            </div>
        </div>
    </div>

    <div id="chat-modal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
        <div class="p-6 flex justify-between items-center app-card">
            <button onclick="closeChat()" class="material-icons">arrow_back</button>
            <h2 id="chat-target-name" class="font-black italic text-sm">USER</h2>
            <div class="online-dot"></div>
        </div>
        <div id="private-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-zinc-900 flex gap-2">
            <input type="text" id="private-chat-in" placeholder="Type..." class="flex-1 bg-zinc-800 p-4 rounded-2xl outline-none text-sm">
            <button id="btn-private-send" class="bg-fuchsia-600 p-4 rounded-2xl"><span class="material-icons">send</span></button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 app-card border-t border-white/5 flex justify-around p-4 pb-8 z-50">
        <button onclick="tab('chat')" class="text-fuchsia-500" id="tab-chat"><span class="material-icons">explore</span></button>
        <button onclick="tab('shop')" class="text-zinc-600" id="tab-shop"><span class="material-icons">shopping_bag</span></button>
        <button onclick="tab('arcade')" class="text-zinc-600" id="tab-arcade"><span class="material-icons">casino</span></button>
        <button onclick="tab('settings')" class="text-zinc-600" id="tab-settings"><span class="material-icons">settings</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, serverTimestamp, addDoc, orderBy, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null; let userData = {}; let chatUnsub = null;
        const frames = [ {id:'frame-gold', n:'Gold', p:500, c:'frame-gold'}, {id:'frame-fuchsia', n:'Neon', p:300, c:'frame-fuchsia'}, {id:'frame-cyan', n:'Ice', p:200, c:'frame-cyan'} ];

        window.tab = (t) => {
            ['view-chat', 'view-shop', 'view-arcade', 'view-settings'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById('view-' + t).classList.remove('hidden');
            if(t === 'shop') renderShop();
        };

        // SHOP
        window.renderShop = () => {
            const list = document.getElementById('shop-list'); list.innerHTML = "";
            frames.forEach(f => {
                const owned = userData.inventory?.includes(f.id);
                const div = document.createElement('div');
                div.className = "app-card p-4 rounded-2xl flex items-center justify-between";
                div.innerHTML = `<div class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-zinc-800 ${f.c}"></div>
                    <p class="text-xs font-black uppercase italic">${f.n} - ${f.p} SP</p></div>
                    <button onclick="${owned ? `equip('${f.id}')` : `buy('${f.id}', ${f.p})`}" class="bg-zinc-800 px-4 py-2 rounded-xl text-[9px] font-black uppercase">${owned ? 'Equip' : 'Buy'}</button>`;
                list.appendChild(div);
            });
        };
        window.buy = async (id, price) => { if(userData.points >= price) await updateDoc(doc(db,"users",currentUser.uid), { points:increment(-price), inventory: [...(userData.inventory||[]), id] }); };
        window.equip = async (id) => { await updateDoc(doc(db,"users",currentUser.uid), { equippedFrame: id }); };

        // GAME
        const topics = [{t:"YouTube", v:200}, {t:"Socialize", v:1}, {t:"Roblox", v:80}, {t:"Minecraft", v:120}];
        let round = { a: topics[0], b: topics[1] };
        window.guess = async (dir) => {
            const win = (dir==='higher' && round.b.v > round.a.v) || (dir==='lower' && round.b.v < round.a.v);
            if(win) await updateDoc(doc(db,"users",currentUser.uid), { points: increment(10) });
            round.a = round.b; round.b = topics[Math.floor(Math.random()*topics.length)];
            document.getElementById('game-a').innerText = round.a.t; document.getElementById('game-b').innerText = round.b.t;
        };

        // CHAT
        window.openChat = async (tid, tname) => {
            const rid = [currentUser.uid, tid].sort().join("_");
            document.getElementById('chat-target-name').innerText = tname;
            document.getElementById('chat-modal').classList.remove('hidden');
            chatUnsub = onSnapshot(query(collection(db,"rooms",rid,"messages"), orderBy("createdAt","asc")), (s) => {
                const b = document.getElementById('private-chat-box'); b.innerHTML = "";
                s.forEach(d => { const m=d.data(); b.innerHTML += `<div class="msg ${m.uid===currentUser.uid?'msg-mine':'msg-theirs'}">${m.text}</div>`; });
                b.scrollTop = b.scrollHeight;
            });
            document.getElementById('btn-private-send').onclick = async () => {
                const i = document.getElementById('private-chat-in'); if(!i.value) return;
                const t = i.value; i.value = "";
                if(!(await getDoc(doc(db,"rooms",rid))).exists()) await setDoc(doc(db,"rooms",rid), {participants:[currentUser.uid, tid]});
                await addDoc(collection(db,"rooms",rid,"messages"), { text:t, uid:currentUser.uid, createdAt:serverTimestamp() });
            };
        };
        window.closeChat = () => { document.getElementById('chat-modal').classList.add('hidden'); if(chatUnsub) chatUnsub(); };

        // DISCOVERY
        window.refreshUsers = async () => {
            const snap = await getDocs(query(collection(db, "users"), where("status", "==", "online")));
            const list = document.getElementById('users-list'); list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                if(d.id !== currentUser.uid && (Date.now() - (u.lastActive?.toMillis()||0) < 300000)) {
                    list.innerHTML += `<div class="flex items-center justify-between p-4 app-card rounded-2xl">
                        <p class="text-xs font-black italic uppercase">${u.name}</p>
                        <button onclick="openChat('${d.id}','${u.name}')" class="bg-fuchsia-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Chat</button></div>`;
                }
            });
        };

        onAuthStateChanged(auth, async (user) => {
            if(!user) return window.location.href='index.html';
            currentUser = user;
            const ref = doc(db, "users", user.uid);
            await updateDoc(ref, { status: "online", lastActive: serverTimestamp() });
            setInterval(() => updateDoc(ref, { lastActive: serverTimestamp() }), 60000);
            onSnapshot(ref, (s) => {
                userData = s.data();
                document.getElementById('ui-points').innerText = userData.points + " SP";
                document.getElementById('verified-badge').classList.toggle('hidden', !userData.isVerified);
                document.getElementById('my-frame').className = "w-20 h-20 mx-auto rounded-2xl overflow-hidden " + (userData.equippedFrame || "");
                document.getElementById('my-pfp').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${user.uid}`;
            });
            refreshUsers();
        });
        document.getElementById('btn-logout').onclick = () => { signOut(auth); };
    </script>
</body>
</html>
