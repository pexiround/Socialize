<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .editor { font-family: 'Fira Code', monospace; background: #000; color: #d946ef; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 flex justify-between items-center app-card">
        <h1 class="text-xl font-black italic text-fuchsia-600">SOCIALIZE</h1>
        <div class="flex items-center gap-4">
            <span id="verified-badge" class="hidden material-icons text-blue-400 text-lg">verified</span>
            <p id="ui-points" class="text-yellow-500 font-bold text-[10px] tracking-widest uppercase">0 SP</p>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-6 pb-32 space-y-6">
        
        <div class="app-card p-6 rounded-[35px] border-b-4 border-fuchsia-950">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-black uppercase text-zinc-500">JS Fundamentals</span>
                <span id="ui-percent" class="text-fuchsia-500 font-bold text-[10px]">0%</span>
            </div>
            <div class="w-full bg-zinc-950 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-fuchsia-600 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div id="lesson-engine" class="app-card p-8 rounded-[40px] space-y-6">
            <div class="space-y-2">
                <h2 id="lesson-title" class="text-xl font-black italic uppercase">Loading...</h2>
                <p id="lesson-desc" class="text-xs text-zinc-400 leading-relaxed"></p>
            </div>

            <div class="relative">
                <textarea id="code-input" class="w-full h-40 editor p-6 rounded-3xl outline-none border border-white/5 focus:border-fuchsia-600/30 transition-all text-sm" placeholder="// Enter code here..."></textarea>
                <div id="success-overlay" class="hidden absolute inset-0 bg-green-500/10 rounded-3xl flex items-center justify-center border border-green-500/30">
                    <span class="material-icons text-green-500 text-4xl">check_circle</span>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="checkCode()" class="flex-1 bg-fuchsia-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-fuchsia-900/20 active:scale-95 transition-transform">Run & Check</button>
                <button onclick="showAI()" class="w-16 bg-zinc-900 rounded-2xl flex items-center justify-center border border-white/10 text-fuchsia-500">
                    <span class="material-icons">auto_awesome</span>
                </button>
            </div>
        </div>
    </div>

    <div id="ai-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-8 backdrop-blur-md">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[40px] p-8 border border-white/10 text-center space-y-4">
            <span class="material-icons text-fuchsia-600 text-4xl">psychology</span>
            <h3 class="font-black italic uppercase">AI Mentor Hint</h3>
            <p id="ai-text" class="text-[11px] text-zinc-400 leading-relaxed italic"></p>
            <button onclick="document.getElementById('ai-modal').classList.add('hidden')" class="w-full bg-zinc-800 py-4 rounded-xl font-black uppercase text-[9px] mt-4">I got this</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, userData = {};
        
        const path = [
            { id: 1, t: "Say Hello", d: "In JS, <code>alert()</code> creates a pop-up. Try it with 'Hello'.", k: "alert('Hello')", h: "Type alert('Hello') exactly as seen!" },
            { id: 2, t: "Variables", d: "Create a variable named <code>xp</code> and set it to 100.", k: "let xp = 100", h: "Use 'let' followed by 'xp = 100'" },
            { id: 3, t: "The Console", d: "Write <code>console.log('Safe')</code> to print to the log.", k: "console.log('Safe')", h: "Check your spelling: console.log()" }
        ];

        window.loadLesson = (lvl) => {
            const l = path.find(i => i.id === lvl) || path[path.length - 1];
            document.getElementById('lesson-title').innerText = l.t;
            document.getElementById('lesson-desc').innerHTML = l.d;
            document.getElementById('code-input').value = "";
            document.getElementById('success-overlay').classList.add('hidden');
        };

        window.checkCode = async () => {
            const input = document.getElementById('code-input').value.trim();
            const current = path.find(i => i.id === userData.level);
            if(input === current.k) {
                document.getElementById('success-overlay').classList.remove('hidden');
                setTimeout(async () => {
                    await updateDoc(doc(db, "users", currentUser.uid), { level: increment(1), points: increment(100) });
                }, 1200);
            } else { alert("Try again! Your syntax might be slightly off."); }
        };

        window.showAI = () => {
            document.getElementById('ai-text').innerText = path.find(i => i.id === userData.level).h;
            document.getElementById('ai-modal').classList.remove('hidden');
        };

        onAuthStateChanged(auth, (u) => {
            if(!u) return window.location.href='index.html';
            currentUser = u;
            onSnapshot(doc(db, "users", u.uid), (s) => {
                userData = s.data();
                document.getElementById('ui-points').innerText = userData.points + " SP";
                document.getElementById('verified-badge').classList.toggle('hidden', !userData.isVerified);
                const p = Math.floor(((userData.level - 1) / path.length) * 100);
                document.getElementById('progress-bar').style.width = p + "%";
                document.getElementById('ui-percent').innerText = p + "%";
                loadLesson(userData.level);
            });
        });
    </script>
</body>
</html>
