<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socialize | Pixel Ascent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'VT323', monospace; touch-action: none; }
        canvas { image-rendering: pixelated; } /* Makes Three.js look like pixel art */
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .joy-base { width: 100px; height: 100px; background: rgba(0,0,0,0.3); border-radius: 50%; position: relative; pointer-events: auto; }
        .joy-knob { width: 40px; height: 40px; background: white; border-radius: 50%; position: absolute; top: 30px; left: 30px; }
        .btn-grab { width: 60px; height: 60px; background: #333; color: white; border: 4px solid white; border-radius: 10px; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .btn-grab.holding { background: #22c55e; border-color: #bef264; box-shadow: 0 0 15px #22c55e; }
    </style>
</head>
<body>

    <div class="fixed top-4 left-4 z-50 text-white drop-shadow-lg">
        <h1 id="height" class="text-4xl uppercase">HEIGHT: 0m</h1>
    </div>

    <div class="controls">
        <div class="flex flex-col items-center gap-4">
            <div id="j-l" class="joy-base"><div id="k-l" class="joy-knob"></div></div>
            <button id="b-l" class="btn-grab" onclick="toggleGrab('l')">HOLD</button>
        </div>
        <div class="flex flex-col items-center gap-4">
            <div id="j-r" class="joy-base"><div id="k-r" class="joy-knob"></div></div>
            <button id="b-r" class="btn-grab" onclick="toggleGrab('r')">HOLD</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, leftH, rightH, mountain;
        let grips = [], state = { l: {x:0, y:0, hold: false, anchor: null}, r: {x:0, y:0, hold: false, anchor: null} };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Sky
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: false }); // No antialias = sharper pixels
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Light
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            // The Mountain (Pixel style)
            const wall = new THREE.Mesh(new THREE.PlaneGeometry(10, 500), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            wall.position.z = -1;
            scene.add(wall);

            // Random Ledges
            for(let i=0; i<300; i++) {
                const g = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.3), new THREE.MeshStandardMaterial({color: 0x3e2723}));
                g.position.set((Math.random()-0.5)*6, i*1.2, -0.8);
                scene.add(g);
                grips.push(g);
            }

            // Humanoid Player (Blocks)
            player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), new THREE.MeshStandardMaterial({color: 0x1e88e5}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.3), new THREE.MeshStandardMaterial({color: 0xffccbc}));
            head.position.y = 0.6;
            player.add(body, head);
            
            leftH = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0xffccbc}));
            rightH = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0xffccbc}));
            
            scene.add(player, leftH, rightH);
            setupJoysticks();
        }

        window.toggleGrab = (side) => {
            const btn = document.getElementById('b-'+side);
            if (state[side].hold) {
                state[side].hold = false;
                state[side].anchor = null;
                btn.classList.remove('holding');
                btn.innerText = "HOLD";
            } else {
                // Try to find a ledge
                const hand = side === 'l' ? leftH : rightH;
                let found = false;
                grips.forEach(g => {
                    if (hand.position.distanceTo(g.position) < 0.7) {
                        state[side].hold = true;
                        state[side].anchor = g.position.clone();
                        btn.classList.add('holding');
                        btn.innerText = "GRIP";
                        found = true;
                    }
                });
                if(!found) {
                    btn.classList.add('bg-red-500');
                    setTimeout(() => btn.classList.remove('bg-red-500'), 200);
                }
            }
        };

        function setupJoysticks() {
            const move = (e, side) => {
                const zone = document.getElementById('j-'+side);
                const knob = document.getElementById('k-'+side);
                const rect = zone.getBoundingClientRect();
                const t = e.touches ? e.touches[0] : e;
                let x = (t.clientX - (rect.left + 50)) / 50;
                let y = (t.clientY - (rect.top + 50)) / 50;
                const dist = Math.sqrt(x*x + y*y);
                if(dist > 1) { x/=dist; y/=dist; }
                knob.style.transform = `translate(${x*30}px, ${y*30}px)`;
                state[side].x = x; state[side].y = -y;
            };
            ['l','r'].forEach(s => {
                const z = document.getElementById('j-'+s);
                z.addEventListener('touchmove', e => move(e, s));
                z.addEventListener('touchend', () => {
                    document.getElementById('k-'+s).style.transform = 'translate(0,0)';
                    state[s].x = 0; state[s].y = 0;
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Hand movement relative to body
            const targetL = new THREE.Vector3(player.position.x - 0.7 + state.l.x*1.5, player.position.y + 0.5 + state.l.y*1.5, 0);
            const targetR = new THREE.Vector3(player.position.x + 0.7 + state.r.x*1.5, player.position.y + 0.5 + state.r.y*1.5, 0);

            if(!state.l.hold) leftH.position.lerp(targetL, 0.2);
            else leftH.position.copy(state.l.anchor);

            if(!state.r.hold) rightH.position.lerp(targetR, 0.2);
            else rightH.position.copy(state.r.anchor);

            // Climbing Physics
            if (state.l.hold || state.r.hold) {
                const anchor = new THREE.Vector3();
                if(state.l.hold && state.r.hold) anchor.addVectors(state.l.anchor, state.r.anchor).multiplyScalar(0.5);
                else anchor.copy(state.l.anchor || state.r.anchor);
                
                player.position.y = THREE.MathUtils.lerp(player.position.y, anchor.y - 0.7, 0.1);
                player.position.x = THREE.MathUtils.lerp(player.position.x, anchor.x, 0.1);
            } else {
                player.position.y -= 0.1; // Fall
                if(player.position.y < 0) player.position.y = 0;
            }

            camera.position.y = THREE.MathUtils.lerp(camera.position.y, player.position.y + 1, 0.1);
            document.getElementById('height').innerText = `HEIGHT: ${Math.floor(player.position.y)}m`;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
