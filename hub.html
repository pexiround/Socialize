<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .editor { font-family: 'Fira Code', monospace; background: #000; color: #d946ef; resize: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 flex justify-between items-center app-card">
        <h1 class="text-xl font-black italic text-fuchsia-600">SOCIALIZE</h1>
        <div class="flex items-center gap-4">
            <span id="v-badge" class="hidden material-icons text-blue-400 text-lg">verified</span>
            <p id="ui-points" class="text-yellow-500 font-bold text-xs uppercase">0 SP</p>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-6 pb-32 space-y-6">
        
        <div class="app-card p-6 rounded-[32px]">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Progress</span>
                <span id="ui-percent" class="text-fuchsia-500 font-black text-xs">0%</span>
            </div>
            <div class="w-full bg-black h-2 rounded-full overflow-hidden border border-white/5">
                <div id="p-bar" class="bg-fuchsia-600 h-full transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="app-card p-8 rounded-[40px] space-y-6">
            <div class="space-y-2">
                <h2 id="l-title" class="text-2xl font-black italic uppercase">Loading...</h2>
                <p id="l-desc" class="text-xs text-zinc-400 leading-relaxed"></p>
            </div>

            <div class="relative">
                <textarea id="c-input" class="w-full h-44 editor p-6 rounded-3xl outline-none border border-white/5 focus:border-fuchsia-600/40 transition-all" placeholder="Enter code here..."></textarea>
                <div id="success-ui" class="hidden absolute inset-0 bg-green-500/10 rounded-3xl flex items-center justify-center border border-green-500/30 backdrop-blur-sm">
                    <span class="material-icons text-green-500 text-5xl">check_circle</span>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="validate()" class="flex-1 bg-fuchsia-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg shadow-fuchsia-900/20 active:scale-95 transition-all">Run Code</button>
                <button onclick="getHint()" class="w-16 bg-zinc-900 rounded-2xl flex items-center justify-center border border-white/10 text-fuchsia-500"><span class="material-icons">auto_awesome</span></button>
            </div>
        </div>
    </div>

    <div id="ai-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-8 backdrop-blur-md">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[40px] p-8 border border-white/10 text-center space-y-4">
            <span class="material-icons text-fuchsia-500 text-5xl">psychology</span>
            <h3 class="font-black italic uppercase text-lg">AI Hint</h3>
            <p id="ai-text" class="text-[12px] text-zinc-400 leading-relaxed"></p>
            <button onclick="document.getElementById('ai-modal').classList.add('hidden')" class="w-full bg-zinc-800 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Understood</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userObj = null;
        let userLevel = 1;

        const levels = [
            { id: 1, name: "Start Alert", task: "Use alert('Hello') to create a popup.", goal: "alert('hello')", hint: "Type: alert('Hello') - make sure quotes and brackets are there!" },
            { id: 2, name: "The Variable", task: "Create a variable called points and set it to 50.", goal: "letpoints=50", hint: "Type: let points = 50" },
            { id: 3, name: "The Console", task: "Print 'Socialize' to the console.", goal: "console.log('socialize')", hint: "Type: console.log('Socialize')" }
        ];

        window.updateUI = (lvl) => {
            const data = levels.find(x => x.id === lvl) || levels[levels.length - 1];
            document.getElementById('l-title').innerText = data.name;
            document.getElementById('l-desc').innerHTML = data.task;
            document.getElementById('c-input').value = "";
            document.getElementById('success-ui').classList.add('hidden');
        };

        window.validate = async () => {
            const code = document.getElementById('c-input').value.toLowerCase().replace(/\s/g, '');
            const current = levels.find(x => x.id === userLevel);
            
            if(code === current.goal.replace(/\s/g, '')) {
                document.getElementById('success-ui').classList.remove('hidden');
                setTimeout(async () => {
                    await updateDoc(doc(db, "users", userObj.uid), { 
                        level: increment(1), 
                        points: increment(100) 
                    });
                }, 1000);
            } else {
                alert("Hint: Try clicking the AI icon for help!");
            }
        };

        window.getHint = () => {
            const current = levels.find(x => x.id === userLevel);
            document.getElementById('ai-text').innerText = current.hint;
            document.getElementById('ai-modal').classList.remove('hidden');
        };

        onAuthStateChanged(auth, (u) => {
            if(!u) return window.location.href = 'index.html';
            userObj = u;

            onSnapshot(doc(db, "users", u.uid), (snap) => {
                if(snap.exists()){
                    const data = snap.data();
                    userLevel = data.level || 1;
                    
                    // UI UPDATES
                    document.getElementById('ui-points').innerText = (data.points || 0) + " SP";
                    document.getElementById('v-badge').classList.toggle('hidden', !data.isVerified);
                    
                    // MATH FIX (No more NaN)
                    const progress = Math.min(Math.floor(((userLevel - 1) / levels.length) * 100), 100);
                    document.getElementById('p-bar').style.width = progress + "%";
                    document.getElementById('ui-percent').innerText = progress + "%";

                    updateUI(userLevel);
                }
            });
        });
    </script>
</body>
</html>
