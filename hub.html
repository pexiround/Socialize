<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .searching { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .msg { margin-bottom: 8px; padding: 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: flex-end; gap: 8px; }
        .msg-mine { background: #d946ef; margin-left: auto; flex-direction: row-reverse; border-bottom-right-radius: 4px; }
        .msg-theirs { background: #1a1a1a; margin-right: auto; border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 flex justify-between items-center app-card">
        <div>
            <h1 class="text-xl font-black italic text-fuchsia-600">SOCIALIZE</h1>
            <p id="ui-points" class="text-yellow-500 font-bold text-[10px] tracking-widest uppercase">0 SP</p>
        </div>
        <div id="searching-tag" class="hidden text-[10px] font-black text-fuchsia-400 searching uppercase">Searching...</div>
    </div>

    <div id="content" class="flex-1 overflow-y-auto p-6">
        
        <div id="view-chat" class="h-full flex flex-col space-y-4">
            <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pr-2">
                <div class="text-center text-zinc-600 text-[10px] uppercase font-bold py-10">Start a search to find peers</div>
            </div>
            <button id="btn-search" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-xs">Search for Stranger</button>
            <div id="chat-controls" class="hidden flex gap-2 pb-20">
                <input type="text" id="chat-in" placeholder="Message..." class="flex-1 bg-zinc-900 p-4 rounded-2xl outline-none text-sm border border-white/5">
                <button id="btn-send" class="bg-fuchsia-600 p-4 rounded-2xl flex items-center justify-center"><span class="material-icons">send</span></button>
            </div>
        </div>

        <div id="view-game" class="hidden space-y-6 text-center pt-10">
            <h2 class="text-3xl font-black italic uppercase">Higher or Lower</h2>
            <div class="flex justify-center items-center py-10">
                <div class="text-8xl font-black text-fuchsia-600" id="current-card">5</div>
            </div>
            <div class="flex gap-4">
                <button id="game-higher" class="flex-1 bg-white text-black py-6 rounded-3xl font-black uppercase">Higher</button>
                <button id="game-lower" class="flex-1 bg-zinc-800 py-6 rounded-3xl font-black uppercase">Lower</button>
            </div>
            <p class="text-[10px] text-red-500 font-bold uppercase tracking-widest">Wrong guess = 0 SP balance</p>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 app-card border-t flex justify-around p-4 pb-8 z-50">
        <button id="nav-chat" class="text-fuchsia-500"><span class="material-icons">forum</span></button>
        <button id="nav-game" class="text-zinc-600"><span class="material-icons">casino</span></button>
        <button onclick="location.reload()" class="text-zinc-600"><span class="material-icons">refresh</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userPoints = 0;
        let currentNum = 5;

        // UI Switching Logic (Fixed)
        const showTab = (tab) => {
            document.getElementById('view-chat').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('view-game').classList.toggle('hidden', tab !== 'game');
            document.getElementById('nav-chat').className = tab === 'chat' ? 'text-fuchsia-500' : 'text-zinc-600';
            document.getElementById('nav-game').className = tab === 'game' ? 'text-fuchsia-500' : 'text-zinc-600';
        };

        document.getElementById('nav-chat').onclick = () => showTab('chat');
        document.getElementById('nav-game').onclick = () => showTab('game');

        onAuthStateChanged(auth, async (user) => {
            if(!user) { window.location.href = 'index.html'; return; }
            
            const userRef = doc(db, "users", user.uid);

            // 1. Sync User Data
            const syncUser = async () => {
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    userPoints = snap.data().points || 0;
                    document.getElementById('ui-points').innerText = userPoints + " SP";
                } else {
                    await setDoc(userRef, { points: 100, name: user.email.split('@')[0] });
                }
            };
            syncUser();

            // 2. Chat Logic
            document.getElementById('btn-search').onclick = () => {
                document.getElementById('btn-search').classList.add('hidden');
                document.getElementById('searching-tag').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('searching-tag').classList.add('hidden');
                    document.getElementById('chat-controls').classList.remove('hidden');
                }, 1500);
            };

            const q = query(collection(db, "messages"), orderBy("createdAt", "desc"), limit(20));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.docs.reverse().forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.uid === user.uid ? 'msg-mine' : 'msg-theirs'}`;
                    div.innerHTML = `<span>${m.text}</span>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });

            document.getElementById('btn-send').onclick = async () => {
                const inp = document.getElementById('chat-in');
                if(!inp.value) return;
                await addDoc(collection(db, "messages"), { text: inp.value, uid: user.uid, createdAt: serverTimestamp() });
                await updateDoc(userRef, { points: increment(2) });
                inp.value = "";
                syncUser();
            };

            // 3. Higher or Lower Logic (Fixed)
            const handleGamble = async (choice) => {
                const nextNum = Math.floor(Math.random() * 10) + 1;
                const win = (choice === 'high' && nextNum >= currentNum) || (choice === 'low' && nextNum <= currentNum);
                
                if(win) {
                    await updateDoc(userRef, { points: increment(userPoints) });
                    alert(`WIN! It was ${nextNum}. Points doubled.`);
                } else {
                    await updateDoc(userRef, { points: 0 });
                    alert(`LOSE! It was ${nextNum}. Balance wiped.`);
                }
                currentNum = nextNum;
                document.getElementById('current-card').innerText = currentNum;
                syncUser();
            };

            document.getElementById('game-higher').onclick = () => handleGamble('high');
            document.getElementById('game-lower').onclick = () => handleGamble('low');
        });
    </script>
</body>
</html>
