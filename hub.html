<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .interest-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .interest-chip.selected { background: #d946ef; border-color: #d946ef; color: white; }
        .msg { margin-bottom: 8px; padding: 12px; border-radius: 20px; font-size: 13px; max-width: 80%; }
        .msg-mine { background: #d946ef; margin-left: auto; border-bottom-right-radius: 4px; }
        .msg-theirs { background: #1a1a1a; margin-right: auto; border-bottom-left-radius: 4px; }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        .offline-dot { width: 8px; height: 8px; background: #3f3f46; border-radius: 50%; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 flex justify-between items-center app-card">
        <div>
            <h1 class="text-xl font-black italic text-fuchsia-600">SOCIALIZE</h1>
            <p id="ui-points" class="text-yellow-500 font-bold text-[10px] tracking-widest uppercase">0 SP</p>
        </div>
    </div>

    <div id="main-content" class="flex-1 overflow-y-auto p-6 pb-24">
        
        <div id="view-chat" class="space-y-6">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Interests</h3>
            <div id="interests-box" class="flex flex-wrap gap-2">
                <div class="interest-chip" onclick="toggleInterest(this, 'Gaming')">Gaming</div>
                <div class="interest-chip" onclick="toggleInterest(this, 'Coding')">Coding</div>
                <div class="interest-chip" onclick="toggleInterest(this, 'Music')">Music</div>
                <div class="interest-chip" onclick="toggleInterest(this, 'Anime')">Anime</div>
            </div>
            <div class="flex justify-between items-center pt-4 border-t border-white/5">
                <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Online Now</h3>
                <button onclick="refreshUsers()" class="material-icons text-sm text-zinc-500">refresh</button>
            </div>
            <div id="users-list" class="space-y-3"></div>
        </div>

        <div id="view-messages" class="hidden space-y-4">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Recent Conversations</h3>
            <div id="convos-list" class="space-y-3"></div>
        </div>

        <div id="view-arcade" class="hidden space-y-4">
            <div class="app-card p-6 rounded-[30px] border border-fuchsia-600/20">
                <h3 class="font-black text-sm uppercase italic">Daily Bonus</h3>
                <p id="reward-timer" class="text-[10px] text-zinc-500 mb-3">Checking time...</p>
                <button id="btn-daily" class="w-full bg-fuchsia-600 py-3 rounded-xl font-black text-[10px] uppercase disabled:opacity-30 disabled:bg-zinc-800">Claim 50 SP</button>
            </div>
            <div class="app-card p-6 rounded-[30px] border border-white/5 flex justify-between items-center">
                <div>
                    <h3 class="font-black text-sm uppercase italic">Quick Draw</h3>
                    <p class="text-[10px] text-zinc-500">Reaction battle (Wager 10 SP)</p>
                </div>
                <button onclick="startQuickDraw()" class="bg-white text-black px-4 py-2 rounded-xl font-black text-[10px] uppercase">Play</button>
            </div>
        </div>

        <div id="view-settings" class="hidden space-y-6">
            <div class="text-center py-10 app-card rounded-[40px]">
                <h2 class="text-2xl font-black italic flex items-center justify-center gap-2">
                    <span id="display-name">User</span>
                    <span id="verified-badge" class="hidden material-icons text-blue-500">verified</span>
                </h2>
                <button id="btn-logout" class="mt-4 text-red-500 text-[10px] font-bold uppercase tracking-widest">Logout</button>
            </div>
        </div>
    </div>

    <div id="chat-modal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
        <div class="p-6 flex justify-between items-center app-card">
            <button onclick="closeChat()" class="material-icons">arrow_back</button>
            <h2 id="chat-target-name" class="font-black uppercase italic text-sm">Chat</h2>
            <div id="chat-target-status" class="online-dot"></div>
        </div>
        <div id="private-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-zinc-900/50 flex gap-2">
            <input type="text" id="private-chat-in" placeholder="Message..." class="flex-1 bg-zinc-800 p-4 rounded-2xl outline-none text-sm">
            <button id="btn-private-send" class="bg-fuchsia-600 p-4 rounded-2xl"><span class="material-icons text-white">send</span></button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 app-card border-t border-white/5 flex justify-around p-4 pb-8 z-[50]">
        <button onclick="tab('chat')" id="tab-chat" class="text-fuchsia-500"><span class="material-icons">explore</span></button>
        <button onclick="tab('messages')" id="tab-messages" class="text-zinc-600"><span class="material-icons">forum</span></button>
        <button onclick="tab('arcade')" id="tab-arcade" class="text-zinc-600"><span class="material-icons">sports_esports</span></button>
        <button onclick="tab('settings')" id="tab-settings" class="text-zinc-600"><span class="material-icons">settings</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, serverTimestamp, addDoc, orderBy, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let myInterests = [];
        let chatUnsub = null;

        // TAB NAVIGATION
        window.tab = (t) => {
            ['view-chat', 'view-messages', 'view-arcade', 'view-settings'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById('view-' + t).classList.remove('hidden');
            ['tab-chat', 'tab-messages', 'tab-arcade', 'tab-settings'].forEach(btn => document.getElementById(btn).classList.replace('text-fuchsia-500', 'text-zinc-600'));
            document.getElementById('tab-' + t).classList.replace('text-zinc-600', 'text-fuchsia-500');
            if(t === 'messages') loadConversations();
        };

        // DISCOVER: ONLINE ONLY
        window.refreshUsers = async () => {
            const list = document.getElementById('users-list');
            list.innerHTML = `<p class="text-[10px] text-zinc-700 text-center animate-pulse py-10">SEARCHING...</p>`;
            const q = query(collection(db, "users"), where("status", "==", "online"));
            const snap = await getDocs(q);
            let peers = [];
            snap.forEach(d => {
                if(d.id !== currentUser.uid) {
                    const data = d.data();
                    let score = (data.interests || []).filter(i => myInterests.includes(i)).length;
                    peers.push({ id: d.id, ...data, score });
                }
            });
            peers.sort((a, b) => b.score - a.score);
            list.innerHTML = peers.length ? "" : `<p class="text-[10px] text-zinc-700 text-center py-10">NO ONE ONLINE</p>`;
            peers.forEach(u => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 app-card rounded-2xl border border-white/5";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="https://api.dicebear.com/7.x/shapes/svg?seed=${u.id}" class="w-10 h-10 bg-zinc-800 rounded-xl">
                        <div>
                            <p class="text-xs font-black uppercase italic">${u.name || 'User'}</p>
                            <p class="text-[9px] text-fuchsia-500 font-bold uppercase">${u.score} Matching</p>
                        </div>
                    </div>
                    <button onclick="openChat('${u.id}', '${u.name || 'User'}', 'online')" class="bg-white text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">Chat</button>
                `;
                list.appendChild(div);
            });
        };

        // MESSAGES: HISTORY (CAN BE OFFLINE)
        window.loadConversations = async () => {
            const list = document.getElementById('convos-list');
            list.innerHTML = `<p class="text-[10px] text-zinc-700 text-center py-10">LOADING CHATS...</p>`;
            
            const q = query(collection(db, "rooms"), where("participants", "array-contains", currentUser.uid));
            const snap = await getDocs(q);
            
            list.innerHTML = snap.empty ? `<p class="text-[10px] text-zinc-700 text-center py-10">NO MESSAGES YET</p>` : "";
            
            snap.forEach(async (roomDoc) => {
                const otherId = roomDoc.data().participants.find(id => id !== currentUser.uid);
                const userSnap = await getDoc(doc(db, "users", otherId));
                const u = userSnap.data();
                
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 app-card rounded-2xl border border-white/10";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="${u.status === 'online' ? 'online-dot' : 'offline-dot'}"></div>
                        <p class="text-xs font-black uppercase italic">${u.name || 'User'}</p>
                    </div>
                    <button onclick="openChat('${otherId}', '${u.name}', '${u.status}')" class="text-fuchsia-500 material-icons">chevron_right</button>
                `;
                list.appendChild(div);
            });
        };

        // CHAT ENGINE
        window.openChat = async (targetId, targetName, targetStatus) => {
            const roomId = [currentUser.uid, targetId].sort().join("_");
            const roomRef = doc(db, "rooms", roomId);
            const roomSnap = await getDoc(roomRef);

            if (!roomSnap.exists() && targetStatus !== "online") {
                return alert("User is offline. You must start new chats while they are online!");
            }

            document.getElementById('chat-target-name').innerText = targetName;
            document.getElementById('chat-modal').classList.remove('hidden');
            document.getElementById('chat-target-status').className = targetStatus === 'online' ? 'online-dot' : 'offline-dot';

            const q = query(collection(db, "rooms", roomId, "messages"), orderBy("createdAt", "asc"));
            chatUnsub = onSnapshot(q, (snap) => {
                const box = document.getElementById('private-chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.uid === currentUser.uid ? 'msg-mine' : 'msg-theirs'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });

            document.getElementById('btn-private-send').onclick = async () => {
                const inp = document.getElementById('private-chat-in');
                if(!inp.value) return;
                const text = inp.value; inp.value = "";
                if (!roomSnap.exists()) await setDoc(roomRef, { participants: [currentUser.uid, targetId], createdAt: serverTimestamp() });
                await addDoc(collection(db, "rooms", roomId, "messages"), { text, uid: currentUser.uid, createdAt: serverTimestamp() });
                await updateDoc(doc(db, "users", currentUser.uid), { points: increment(2) });
            };
        };

        window.closeChat = () => {
            document.getElementById('chat-modal').classList.add('hidden');
            if(chatUnsub) chatUnsub();
        };

        // DAILY REWARD TIMER
        function updateRewardTimer(lastClaim) {
            const btn = document.getElementById('btn-daily');
            const timerText = document.getElementById('reward-timer');
            const nextAvailable = (lastClaim?.toMillis() || 0) + 86400000;
            
            const tick = () => {
                const diff = nextAvailable - Date.now();
                if (diff <= 0) {
                    btn.disabled = false;
                    timerText.innerText = "Bonus ready to claim!";
                } else {
                    btn.disabled = true;
                    const hrs = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    timerText.innerText = `Available in ${hrs}h ${mins}m`;
                    setTimeout(tick, 60000);
                }
            };
            tick();
        }

        onAuthStateChanged(auth, async (user) => {
            if(!user) return window.location.href = 'index.html';
            currentUser = user;
            const userRef = doc(db, "users", user.uid);
            await setDoc(userRef, { status: "online", lastActive: serverTimestamp() }, { merge: true });

            onSnapshot(userRef, (s) => {
                const d = s.data();
                if(!d) return;
                document.getElementById('ui-points').innerText = (d.points || 0) + " SP";
                document.getElementById('display-name').innerText = d.name || "Unknown";
                if(d.isVerified) document.getElementById('verified-badge').classList.remove('hidden');
                updateRewardTimer(d.lastClaim);
            });
            refreshUsers();
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth);
        
        document.getElementById('btn-daily').onclick = async () => {
            await updateDoc(doc(db, "users", currentUser.uid), { 
                points: increment(50), 
                lastClaim: serverTimestamp() 
            });
        };

        // ARCADE FOUNDATION
        window.startQuickDraw = () => {
            alert("Waiting for an opponent... (Quick Draw logic coming in next update!)");
        };

    </script>
</body>
</html>
