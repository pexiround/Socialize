<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .msg { margin-bottom: 8px; padding: 12px; border-radius: 20px; font-size: 13px; max-width: 80%; }
        .msg-mine { background: #d946ef; margin-left: auto; border-bottom-right-radius: 4px; }
        .msg-theirs { background: #1a1a1a; margin-right: auto; border-bottom-left-radius: 4px; }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        .offline-dot { width: 8px; height: 8px; background: #3f3f46; border-radius: 50%; }
        
        /* SHOP FRAMES */
        .frame-none { border: 2px solid transparent; }
        .frame-gold { border: 3px solid #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .frame-fuchsia { border: 3px solid #d946ef; box-shadow: 0 0 15px rgba(217, 70, 239, 0.4); }
        .frame-cyan { border: 3px solid #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }
        
        .tap-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 flex justify-between items-center app-card">
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-black italic text-fuchsia-600 leading-none">SOCIALIZE</h1>
            <span id="verified-badge" class="hidden material-icons text-blue-400 text-sm">verified</span>
        </div>
        <div class="text-right">
            <p id="ui-points" class="text-yellow-500 font-bold text-[10px] uppercase tracking-tighter">0 SP</p>
        </div>
    </div>

    <div id="main-content" class="flex-1 overflow-y-auto p-6 pb-24">
        
        <div id="view-chat" class="space-y-6">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Recommended</h3>
            <div id="users-list" class="space-y-3"></div>
        </div>

        <div id="view-shop" class="hidden space-y-6">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Frame Shop</h3>
            <div id="shop-list" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="view-arcade" class="hidden space-y-6">
            <div class="app-card p-10 rounded-[40px] text-center border border-fuchsia-600/20">
                <h2 class="text-2xl font-black italic mb-1">SP TAPPER</h2>
                <p class="text-[9px] text-zinc-500 uppercase mb-8">Tap to earn currency</p>
                <button onclick="tapGame()" class="tap-btn w-32 h-32 bg-fuchsia-600 rounded-full mx-auto flex items-center justify-center shadow-lg transition-transform border-4 border-white/10">
                    <span class="material-icons text-4xl">ads_click</span>
                </button>
            </div>
        </div>

        <div id="view-settings" class="hidden space-y-6">
            <div class="app-card p-8 rounded-[40px] space-y-4 text-center">
                <div id="pfp-preview-wrap" class="w-20 h-20 mx-auto rounded-2xl overflow-hidden frame-none">
                    <img id="my-pfp" src="" class="w-full h-full bg-zinc-800">
                </div>
                <h2 class="text-xl font-black italic" id="set-name">User</h2>
                <input type="text" id="edit-name" placeholder="New Name" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl outline-none text-sm">
                <button onclick="saveProfile()" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px]">Save Changes</button>
            </div>
            <button id="btn-logout" class="w-full text-red-600 font-bold uppercase text-[10px] opacity-50">Logout</button>
        </div>
    </div>

    <div id="chat-modal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
        <div class="p-6 flex justify-between items-center app-card">
            <button onclick="closeChat()" class="material-icons">close</button>
            <div class="text-center">
                <h2 id="chat-target-name" class="font-black uppercase italic text-sm">User</h2>
                <p id="chat-target-seen" class="text-[8px] text-zinc-500 font-bold"></p>
            </div>
            <div id="chat-target-dot" class="online-dot"></div>
        </div>
        <div id="private-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-zinc-900 flex gap-2">
            <input type="text" id="private-chat-in" placeholder="Say something..." class="flex-1 bg-zinc-800 p-4 rounded-2xl outline-none text-sm">
            <button id="btn-private-send" class="bg-fuchsia-600 p-4 rounded-2xl"><span class="material-icons">send</span></button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 app-card border-t border-white/5 flex justify-around p-4 pb-8 z-[50]">
        <button onclick="tab('chat')" id="tab-chat" class="text-fuchsia-500"><span class="material-icons">explore</span></button>
        <button onclick="tab('shop')" id="tab-shop" class="text-zinc-600"><span class="material-icons">shopping_bag</span></button>
        <button onclick="tab('arcade')" id="tab-arcade" class="text-zinc-600"><span class="material-icons">sports_esports</span></button>
        <button onclick="tab('settings')" id="tab-settings" class="text-zinc-600"><span class="material-icons">settings</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, serverTimestamp, addDoc, orderBy, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = {};
        let chatUnsub = null;

        const frameData = [
            { id: 'frame-gold', name: 'Gold Glow', price: 500, class: 'frame-gold' },
            { id: 'frame-fuchsia', name: 'Neon Fuchsia', price: 300, class: 'frame-fuchsia' },
            { id: 'frame-cyan', name: 'Ice Cyan', price: 200, class: 'frame-cyan' }
        ];

        // TABS
        window.tab = (t) => {
            ['view-chat', 'view-shop', 'view-arcade', 'view-settings'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById('view-' + t).classList.remove('hidden');
            ['tab-chat', 'tab-shop', 'tab-arcade', 'tab-settings'].forEach(btn => document.getElementById(btn).classList.replace('text-fuchsia-500', 'text-zinc-600'));
            document.getElementById('tab-' + t).classList.replace('text-zinc-600', 'text-fuchsia-500');
            if(t === 'shop') renderShop();
        };

        // ARCADE
        window.tapGame = async () => {
            if(currentUser) await updateDoc(doc(db, "users", currentUser.uid), { points: increment(1) });
        };

        // SHOP
        window.renderShop = () => {
            const list = document.getElementById('shop-list');
            list.innerHTML = "";
            frameData.forEach(f => {
                const isOwned = userData.inventory?.includes(f.id);
                const isEquipped = userData.equippedFrame === f.id;
                const div = document.createElement('div');
                div.className = "app-card p-4 rounded-2xl flex items-center justify-between";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg bg-zinc-800 ${f.class}"></div>
                        <div>
                            <p class="text-xs font-black italic uppercase">${f.name}</p>
                            <p class="text-[9px] text-yellow-500 font-bold">${f.price} SP</p>
                        </div>
                    </div>
                    <button onclick="${isOwned ? `equipItem('${f.id}')` : `buyItem('${f.id}', ${f.price})`}" 
                        class="px-5 py-2 rounded-xl text-[9px] font-black uppercase ${isOwned ? 'bg-zinc-800' : 'bg-fuchsia-600'}">
                        ${isOwned ? (isEquipped ? 'Equipped' : 'Equip') : 'Buy'}
                    </button>`;
                list.appendChild(div);
            });
        };

        window.buyItem = async (id, price) => {
            if(userData.points < price) return alert("Insufficient SP!");
            await updateDoc(doc(db, "users", currentUser.uid), {
                points: increment(-price),
                inventory: [...(userData.inventory || []), id]
            });
        };

        window.equipItem = async (id) => {
            await updateDoc(doc(db, "users", currentUser.uid), { equippedFrame: id });
        };

        // DISCOVERY & GHOST FIX
        window.refreshUsers = async () => {
            if(!currentUser) return;
            const now = Date.now();
            const fiveMins = 5 * 60 * 1000;

            const rooms = await getDocs(query(collection(db, "rooms"), where("participants", "array-contains", currentUser.uid)));
            const talkedTo = rooms.docs.map(d => d.data().participants.find(id => id !== currentUser.uid));

            const snap = await getDocs(query(collection(db, "users"), where("status", "==", "online")));
            const list = document.getElementById('users-list');
            list.innerHTML = "";
            
            snap.forEach(d => {
                const u = d.data();
                const lastSeen = u.lastActive?.toMillis() || 0;
                // Only show if actually active within 5 mins
                if(d.id !== currentUser.uid && !talkedTo.includes(d.id) && (now - lastSeen < fiveMins)) {
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between p-4 app-card rounded-2xl";
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-zinc-800 rounded-xl overflow-hidden ${u.equippedFrame || 'frame-none'}">
                                <img src="https://api.dicebear.com/7.x/shapes/svg?seed=${d.id}" class="w-full h-full">
                            </div>
                            <p class="text-xs font-black italic uppercase">${u.name || 'User'}</p>
                        </div>
                        <button onclick="openChat('${d.id}', '${u.name}')" class="bg-fuchsia-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Chat</button>`;
                    list.appendChild(div);
                }
            });
        };
        setInterval(refreshUsers, 30000);

        // AUTH & SYNC
        onAuthStateChanged(auth, async (user) => {
            if(!user) return window.location.href = 'index.html';
            currentUser = user;
            const userRef = doc(db, "users", user.uid);
            
            // Heartbeat
            await setDoc(userRef, { status: "online", lastActive: serverTimestamp() }, { merge: true });
            setInterval(() => updateDoc(userRef, { lastActive: serverTimestamp(), status: "online" }), 60000);

            onSnapshot(userRef, (s) => {
                userData = s.data() || {};
                document.getElementById('ui-points').innerText = (userData.points || 0) + " SP";
                document.getElementById('set-name').innerText = userData.name || "User";
                document.getElementById('my-pfp').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${user.uid}`;
                document.getElementById('verified-badge').style.display = userData.isVerified ? 'inline' : 'none';
                document.getElementById('pfp-preview-wrap').className = `w-20 h-20 mx-auto rounded-2xl overflow-hidden ${userData.equippedFrame || 'frame-none'}`;
            });
            refreshUsers();
        });

        // Chat logic remains the same (openChat, closeChat, btn-private-send)...
        // [Add back the chat functions here to complete the file]

        document.getElementById('btn-logout').onclick = async () => {
            await updateDoc(doc(db, "users", currentUser.uid), { status: "offline" });
            signOut(auth);
        };
    </script>
</body>
</html>
