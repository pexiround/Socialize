<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .interest-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .interest-chip.selected { background: #d946ef; border-color: #d946ef; color: white; }
        .msg { margin-bottom: 8px; padding: 12px; border-radius: 20px; font-size: 13px; max-width: 80%; }
        .msg-mine { background: #d946ef; margin-left: auto; border-bottom-right-radius: 4px; }
        .msg-theirs { background: #1a1a1a; margin-right: auto; border-bottom-left-radius: 4px; }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        .offline-dot { width: 8px; height: 8px; background: #3f3f46; border-radius: 50%; }
        /* Smooth Fade for list updates */
        #users-list { transition: all 0.3s ease; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 flex justify-between items-center app-card">
        <div>
            <h1 class="text-xl font-black italic text-fuchsia-600">SOCIALIZE</h1>
            <p id="ui-points" class="text-yellow-500 font-bold text-[10px] tracking-widest uppercase">0 SP</p>
        </div>
    </div>

    <div id="main-content" class="flex-1 overflow-y-auto p-6 pb-24">
        
        <div id="view-chat" class="space-y-6">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Recommended</h3>
            <div id="users-list" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="view-messages" class="hidden space-y-4">
            <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Conversations</h3>
            <div id="convos-list" class="space-y-3"></div>
        </div>

        <div id="view-arcade" class="hidden space-y-4">
             <div class="app-card p-6 rounded-[30px] border border-fuchsia-600/20">
                <h3 class="font-black text-sm uppercase italic">Daily Bonus</h3>
                <p id="reward-timer" class="text-[10px] text-zinc-500 mb-3">Loading...</p>
                <button id="btn-daily" class="w-full bg-fuchsia-600 py-3 rounded-xl font-black text-[10px] uppercase disabled:opacity-30">Claim 50 SP</button>
            </div>
        </div>

        <div id="view-settings" class="hidden space-y-6">
            <div class="app-card p-6 rounded-[40px] space-y-4">
                <div class="text-center">
                    <img id="set-pfp" class="w-20 h-20 rounded-3xl mx-auto bg-zinc-800 border border-fuchsia-500/50">
                    <h2 class="text-xl font-black italic mt-2" id="set-name">Name</h2>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Change Name</label>
                    <input type="text" id="edit-name" class="w-full bg-zinc-900 border border-white/10 p-3 rounded-xl text-sm outline-none">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase">Bio / Status</label>
                    <input type="text" id="edit-bio" placeholder="Vibing..." class="w-full bg-zinc-900 border border-white/10 p-3 rounded-xl text-sm outline-none">
                </div>
                <button onclick="saveProfile()" class="w-full bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase">Save Profile</button>
            </div>
            <button id="btn-logout" class="w-full text-zinc-600 font-bold uppercase text-[10px]">Logout</button>
        </div>
    </div>

    <div id="chat-modal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
        <div class="p-6 flex justify-between items-center app-card">
            <button onclick="closeChat()" class="material-icons">arrow_back</button>
            <div class="text-center">
                <h2 id="chat-target-name" class="font-black uppercase italic text-sm leading-none">Chat</h2>
                <p id="chat-target-seen" class="text-[9px] text-zinc-500 uppercase font-bold mt-1"></p>
            </div>
            <div id="chat-target-dot" class="online-dot"></div>
        </div>
        <div id="private-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-zinc-900/50 flex gap-2">
            <input type="text" id="private-chat-in" placeholder="Message..." class="flex-1 bg-zinc-800 p-4 rounded-2xl outline-none text-sm">
            <button id="btn-private-send" class="bg-fuchsia-600 p-4 rounded-2xl"><span class="material-icons text-white">send</span></button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 app-card border-t border-white/5 flex justify-around p-4 pb-8 z-[50]">
        <button onclick="tab('chat')" id="tab-chat" class="text-fuchsia-500"><span class="material-icons">explore</span></button>
        <button onclick="tab('messages')" id="tab-messages" class="text-zinc-600"><span class="material-icons">forum</span></button>
        <button onclick="tab('arcade')" id="tab-arcade" class="text-zinc-600"><span class="material-icons">sports_esports</span></button>
        <button onclick="tab('settings')" id="tab-settings" class="text-zinc-600"><span class="material-icons">settings</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, serverTimestamp, addDoc, orderBy, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let myInterests = [];
        let chatUnsub = null;
        let myChatIds = []; // Track who we already messaged

        // HELPERS
        function formatTimeAgo(timestamp) {
            if (!timestamp) return "Never seen";
            const seconds = Math.floor((Date.now() - timestamp.toMillis()) / 1000);
            if (seconds < 60) return "Just now";
            const mins = Math.floor(seconds / 60);
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            return "Offline";
        }

        // TAB SYSTEM
        window.tab = (t) => {
            ['view-chat', 'view-messages', 'view-arcade', 'view-settings'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById('view-' + t).classList.remove('hidden');
            ['tab-chat', 'tab-messages', 'tab-arcade', 'tab-settings'].forEach(btn => document.getElementById(btn).classList.replace('text-fuchsia-500', 'text-zinc-600'));
            document.getElementById('tab-' + t).classList.replace('text-zinc-600', 'text-fuchsia-500');
            if(t === 'messages') loadConversations();
        };

        // DISCOVER (Auto-refreshes every 30s)
        window.refreshUsers = async () => {
            if(!currentUser) return;
            // 1. Get IDs of people I've already messaged
            const convoSnap = await getDocs(query(collection(db, "rooms"), where("participants", "array-contains", currentUser.uid)));
            myChatIds = convoSnap.docs.map(d => d.data().participants.find(id => id !== currentUser.uid));

            // 2. Query Online users
            const q = query(collection(db, "users"), where("status", "==", "online"));
            const snap = await getDocs(q);
            const list = document.getElementById('users-list');
            list.innerHTML = "";
            
            snap.forEach(d => {
                const u = d.data();
                // Filter: Not me AND not someone I've messaged
                if(d.id !== currentUser.uid && !myChatIds.includes(d.id)) {
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between p-4 app-card rounded-2xl border border-white/5";
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <img src="https://api.dicebear.com/7.x/shapes/svg?seed=${d.id}" class="w-10 h-10 bg-zinc-800 rounded-xl">
                            <div>
                                <p class="text-xs font-black uppercase italic">${u.name || 'User'}</p>
                                <p class="text-[9px] text-zinc-500 font-bold uppercase">${u.bio || 'New member'}</p>
                            </div>
                        </div>
                        <button onclick="openChat('${d.id}', '${u.name}', 'online')" class="bg-fuchsia-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Chat</button>
                    `;
                    list.appendChild(div);
                }
            });
        };
        setInterval(refreshUsers, 30000); // 30s Refresh

        // CONVERSATIONS
        window.loadConversations = async () => {
            const list = document.getElementById('convos-list');
            list.innerHTML = `<p class="text-[10px] text-zinc-700 text-center py-10">Syncing Messages...</p>`;
            const q = query(collection(db, "rooms"), where("participants", "array-contains", currentUser.uid));
            const snap = await getDocs(q);
            list.innerHTML = "";
            
            snap.forEach(async (roomDoc) => {
                const otherId = roomDoc.data().participants.find(id => id !== currentUser.uid);
                const userSnap = await getDoc(doc(db, "users", otherId));
                const u = userSnap.data();
                
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 app-card rounded-2xl border border-white/10";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="${u.status === 'online' ? 'online-dot' : 'offline-dot'}"></div>
                        <div>
                            <p class="text-xs font-black uppercase italic">${u.name}</p>
                            <p class="text-[9px] text-zinc-600 font-bold uppercase">${u.status === 'online' ? 'Online' : 'Last seen ' + formatTimeAgo(u.lastActive)}</p>
                        </div>
                    </div>
                    <button onclick="openChat('${otherId}', '${u.name}', '${u.status}')" class="text-white material-icons">chevron_right</button>
                `;
                list.appendChild(div);
            });
        };

        // PROFILE CUSTOMIZATION
        window.saveProfile = async () => {
            const name = document.getElementById('edit-name').value;
            const bio = document.getElementById('edit-bio').value;
            if(name) {
                await updateDoc(doc(db, "users", currentUser.uid), { name, bio });
                alert("Profile Updated!");
            }
        };

        // CHAT ENGINE
        window.openChat = async (targetId, targetName, targetStatus) => {
            const roomId = [currentUser.uid, targetId].sort().join("_");
            const roomRef = doc(db, "rooms", roomId);
            
            // Sync status in header
            const targetSnap = await getDoc(doc(db, "users", targetId));
            const tData = targetSnap.data();
            document.getElementById('chat-target-name').innerText = targetName;
            document.getElementById('chat-target-seen').innerText = tData.status === 'online' ? 'ACTIVE NOW' : 'LAST SEEN ' + formatTimeAgo(tData.lastActive);
            document.getElementById('chat-target-dot').className = tData.status === 'online' ? 'online-dot' : 'offline-dot';
            document.getElementById('chat-modal').classList.remove('hidden');

            const q = query(collection(db, "rooms", roomId, "messages"), orderBy("createdAt", "asc"));
            chatUnsub = onSnapshot(q, (snap) => {
                const box = document.getElementById('private-chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.uid === currentUser.uid ? 'msg-mine' : 'msg-theirs'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });

            document.getElementById('btn-private-send').onclick = async () => {
                const inp = document.getElementById('private-chat-in');
                if(!inp.value) return;
                const text = inp.value; inp.value = "";
                const rSnap = await getDoc(roomRef);
                if (!rSnap.exists()) await setDoc(roomRef, { participants: [currentUser.uid, targetId], createdAt: serverTimestamp() });
                await addDoc(collection(db, "rooms", roomId, "messages"), { text, uid: currentUser.uid, createdAt: serverTimestamp() });
                refreshUsers(); // Refresh discover list so they vanish
            };
        };

        window.closeChat = () => {
            document.getElementById('chat-modal').classList.add('hidden');
            if(chatUnsub) chatUnsub();
        };

        // AUTH & PRESENCE
        onAuthStateChanged(auth, async (user) => {
            if(!user) return window.location.href = 'index.html';
            currentUser = user;
            const userRef = doc(db, "users", user.uid);
            
            // Heartbeat: Tell Firebase we are online every 2 mins
            const updateStatus = () => setDoc(userRef, { status: "online", lastActive: serverTimestamp() }, { merge: true });
            updateStatus();
            setInterval(updateStatus, 120000); 

            onSnapshot(userRef, (s) => {
                const d = s.data();
                document.getElementById('ui-points').innerText = (d.points || 0) + " SP";
                document.getElementById('set-name').innerText = d.name;
                document.getElementById('edit-name').value = d.name;
                document.getElementById('edit-bio').value = d.bio || "";
                document.getElementById('set-pfp').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${user.uid}`;
                if(d.isVerified) document.getElementById('verified-badge').classList.remove('hidden');
            });
            refreshUsers();
        });

        document.getElementById('btn-logout').onclick = async () => {
            await updateDoc(doc(db, "users", currentUser.uid), { status: "offline", lastActive: serverTimestamp() });
            signOut(auth);
        };
    </script>
</body>
</html>
