<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socialize | The Ascent Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; touch-action: none; font-family: 'Orbitron', sans-serif; }
        .ctrl-overlay { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 100; }
        .joy-zone { width: 100px; height: 100px; background: rgba(255,0,255,0.1); border-radius: 50%; position: relative; pointer-events: auto; border: 2px solid rgba(255,0,255,0.3); }
        .knob { width: 40px; height: 40px; background: #ff00ff; border-radius: 50%; position: absolute; top: 28px; left: 28px; box-shadow: 0 0 15px #ff00ff; }
        .grab-btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; pointer-events: auto; font-weight: 900; color: white; display:flex; align-items:center; justify-content:center; }
        .grab-btn.active { background: #00ffff; border-color: #00ffff; box-shadow: 0 0 20px #00ffff; }
        .hud-vitals { position: fixed; top: 20px; width: 100%; padding: 0 20px; pointer-events: none; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="hud-vitals">
        <div>
            <p class="text-[10px] text-fuchsia-500 font-black tracking-[0.3em]">ASCENT PROTOCOL</p>
            <h1 id="height-text" class="text-3xl font-black text-white italic">0<span class="text-xs ml-1">M</span></h1>
        </div>
        <div class="text-right">
            <p id="ui-miners" class="text-[10px] text-cyan-400 font-bold">DRONES: 0</p>
            <button onclick="placeMiner()" style="pointer-events: auto;" class="bg-white/10 border border-white/20 px-3 py-1 rounded text-[10px] text-white mt-1">PLACE SAVER (10m)</button>
        </div>
    </div>

    <div class="ctrl-overlay">
        <div class="flex flex-col items-center gap-6">
            <div id="joy-l" class="joy-zone"><div id="knob-l" class="knob"></div></div>
            <div id="btn-l" class="grab-btn">L</div>
        </div>
        <div class="flex flex-col items-center gap-6">
            <div id="joy-r" class="joy-zone"><div id="knob-r" class="knob"></div></div>
            <div id="btn-r" class="grab-btn">R</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, leftHand, rightHand, body, bodyMesh;
        let grips = [], miners = [], limbs = [];
        let state = { l: { x: 0, y: 0, grab: false, anchor: null }, r: { x: 0, y: 0, grab: false, anchor: null } };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            let sun = new THREE.PointLight(0xff00ff, 1, 20);
            scene.add(sun);

            // World: High-tech Tower
            for (let i = 0; i < 100; i++) {
                let g = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.3), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                g.position.set((Math.random() - 0.5) * 5, i * 1.8, -0.5);
                scene.add(g);
                grips.push(g);
            }

            // Player Setup
            const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            body = new THREE.Group();
            bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.4), new THREE.MeshStandardMaterial({color: 0x222222, wireframe: false}));
            body.add(bodyMesh);
            
            leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.15), mat);
            rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.15), mat);
            
            // Stretchy Arms (Lines)
            const lineMat = new THREE.LineBasicMaterial({ color: 0xff00ff });
            const createLimb = () => {
                const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
                const line = new THREE.Line(geo, lineMat);
                scene.add(line);
                return line;
            };
            limbs = [createLimb(), createLimb()];

            scene.add(leftHand, rightHand, body);
            setupInput();
        }

        function setupInput() {
            const bindJoy = (id, side) => {
                const zone = document.getElementById(id);
                const knob = document.getElementById('knob-' + side);
                const move = (e) => {
                    const t = e.touches ? e.touches[0] : e;
                    const r = zone.getBoundingClientRect();
                    let dx = (t.clientX - (r.left + 50)) / 50;
                    let dy = (t.clientY - (r.top + 50)) / 50;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if(d > 1) { dx/=d; dy/=d; }
                    knob.style.transform = `translate(${dx*35}px, ${dy*35}px)`;
                    state[side].x = dx; state[side].y = -dy;
                };
                zone.addEventListener('touchstart', move);
                zone.addEventListener('touchmove', move);
                zone.addEventListener('touchend', () => {
                    knob.style.transform = 'translate(0,0)';
                    state[side].x = 0; state[side].y = 0;
                });
            };
            bindJoy('joy-l', 'l'); bindJoy('joy-r', 'r');

            const bindBtn = (id, side) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    state[side].grab = true;
                    el.classList.add('active');
                    // Check for grip
                    const hand = side === 'l' ? leftHand : rightHand;
                    grips.forEach(g => {
                        if(hand.position.distanceTo(g.position) < 0.6) {
                            state[side].anchor = g.position.clone();
                            g.material.color.set(0x00ffff);
                        }
                    });
                });
                el.addEventListener('touchend', () => {
                    state[side].grab = false;
                    state[side].anchor = null;
                    el.classList.remove('active');
                });
            };
            bindBtn('btn-l', 'l'); bindBtn('btn-r', 'r');
        }

        window.placeMiner = () => {
            if(body.position.y < 5) return alert("Climb higher first!");
            const m = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1), new THREE.MeshStandardMaterial({color: 0x00ff00}));
            m.position.copy(body.position);
            scene.add(m);
            miners.push(m.position.clone());
            document.getElementById('ui-miners').innerText = `DRONES: ${miners.length}`;
        };

        function animate() {
            requestAnimationFrame(animate);

            // Update Hands
            const tL = new THREE.Vector3(body.position.x - 0.7 + state.l.x*2, body.position.y + 0.5 + state.l.y*2, 0);
            const tR = new THREE.Vector3(body.position.x + 0.7 + state.r.x*2, body.position.y + 0.5 + state.r.y*2, 0);
            
            if(!state.l.anchor) leftHand.position.lerp(tL, 0.2);
            else leftHand.position.copy(state.l.anchor);

            if(!state.r.anchor) rightHand.position.lerp(tR, 0.2);
            else rightHand.position.copy(state.r.anchor);

            // Body Physics
            if(state.l.anchor || state.r.anchor) {
                const targetPos = new THREE.Vector3();
                if(state.l.anchor && state.r.anchor) targetPos.addVectors(state.l.anchor, state.r.anchor).multiplyScalar(0.5);
                else targetPos.copy(state.l.anchor || state.r.anchor);
                
                body.position.y = THREE.MathUtils.lerp(body.position.y, targetPos.y - 0.8, 0.05);
                body.position.x = THREE.MathUtils.lerp(body.position.x, targetPos.x, 0.05);
            } else {
                body.position.y -= 0.08; // Gravity
                // Respawn at last miner or floor
                let floor = miners.length > 0 ? miners[miners.length-1].y : 0;
                if(body.position.y < floor) body.position.y = floor;
            }

            // Draw Arms
            const updateLimb = (line, start, end) => {
                line.geometry.setFromPoints([start, end]);
                line.geometry.verticesNeedUpdate = true;
            };
            updateLimb(limbs[0], body.position, leftHand.position);
            updateLimb(limbs[1], body.position, rightHand.position);

            camera.position.y = THREE.MathUtils.lerp(camera.position.y, body.position.y + 1, 0.1);
            document.getElementById('height-text').innerHTML = `${Math.floor(body.position.y)}<span class="text-xs ml-1">M</span>`;
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
