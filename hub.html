<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .frame-neon { border: 4px solid #d946ef; box-shadow: 0 0 20px #d946ef; }
        .frame-gold { border: 4px solid #fbbf24; box-shadow: 0 0 20px #fbbf24; }
        .active-tab { color: #d946ef !important; }
        .msg { margin-bottom: 10px; padding: 12px; border-radius: 18px; font-size: 13px; max-width: 80%; }
        .msg-mine { background: #d946ef; margin-left: auto; border-bottom-right-radius: 4px; }
        .msg-theirs { background: #1a1a1a; margin-right: auto; border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 app-card border-b flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic text-fuchsia-600 uppercase">Socialize</h1>
            <p id="ui-points" class="text-yellow-500 font-bold text-[10px] tracking-widest uppercase">0 SP</p>
        </div>
        <button id="btn-logout" class="text-zinc-600"><span class="material-icons">logout</span></button>
    </div>

    <div class="flex-1 overflow-y-auto p-6" id="main-view">
        
        <div id="view-profile" class="tab-content space-y-6">
            <div class="app-card rounded-[40px] p-8 text-center relative">
                <div id="u-frame" class="w-32 h-32 mx-auto mb-4 rounded-3xl overflow-hidden frame-none relative">
                    <img id="u-pfp" src="https://api.dicebear.com/7.x/shapes/svg?seed=1" class="w-full h-full object-cover">
                    <label for="pfp-up" class="absolute inset-0 bg-black/50 opacity-0 hover:opacity-100 flex items-center justify-center cursor-pointer transition">
                        <span class="material-icons">add_a_photo</span>
                    </label>
                    <input type="file" id="pfp-up" class="hidden" accept="image/*">
                </div>
                <h2 id="u-name" class="text-2xl font-black italic">Loading...</h2>
                <div id="u-badge"></div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase">Shop Preview</h3>
                <div id="shop-items" class="space-y-2"></div>
            </div>
        </div>

        <div id="view-chat" class="tab-content hidden h-full flex flex-col">
            <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 mb-4 pr-2"></div>
            <div class="flex gap-2 pb-24">
                <input type="text" id="chat-in" placeholder="Message (+2 SP)..." class="flex-1 bg-zinc-900 p-4 rounded-2xl outline-none text-sm">
                <button id="btn-send" class="bg-fuchsia-600 p-4 rounded-2xl"><span class="material-icons">send</span></button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 app-card border-t flex justify-around p-4 pb-8 z-50">
        <button onclick="switchTab('profile')" id="nav-profile" class="active-tab"><span class="material-icons">person</span></button>
        <button onclick="switchTab('chat')" id="nav-chat" class="text-zinc-600"><span class="material-icons">forum</span></button>
        <button onclick="alert('Games Coming Tomorrow!')" class="text-zinc-600"><span class="material-icons">sports_esports</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const SHOP = [
            { id: 'frame-neon', name: 'Neon Glow', price: 500 },
            { id: 'frame-gold', name: 'Royal Gold', price: 2000 }
        ];

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.href = 'index.html';
            
            const userRef = doc(db, "users", user.uid);

            const sync = async () => {
                const snap = await getDoc(userRef);
                const d = snap.data() || {};
                
                document.getElementById('u-name').innerText = d.name || "User";
                document.getElementById('ui-points').innerText = (d.points || 0) + " SP";
                document.getElementById('u-frame').className = `w-32 h-32 mx-auto mb-4 rounded-3xl overflow-hidden relative ${d.equippedFrame || ''}`;
                document.getElementById('u-pfp').src = d.pfpUrl || `https://api.dicebear.com/7.x/shapes/svg?seed=${user.uid}`;
                if(d.isVerified) document.getElementById('u-badge').innerHTML = '<span class="material-icons text-blue-500">verified</span>';

                // Shop
                const shopBox = document.getElementById('shop-items');
                shopBox.innerHTML = "";
                SHOP.forEach(item => {
                    if(d.inventory?.includes(item.id)) return;
                    const b = document.createElement('div');
                    b.className = "app-card p-4 rounded-2xl flex justify-between cursor-pointer";
                    b.innerHTML = `<span class='text-xs font-bold uppercase'>${item.name}</span> <span class='text-fuchsia-500 font-black'>${item.price} SP</span>`;
                    b.onclick = async () => {
                        if(d.points < item.price) return alert("Not enough SP");
                        await updateDoc(userRef, { points: increment(-item.price), inventory: arrayUnion(item.id), equippedFrame: item.id });
                        sync();
                    };
                    shopBox.appendChild(b);
                });
            };

            // Chat Logic
            const q = query(collection(db, "messages"), orderBy("createdAt", "desc"), limit(20));
            onSnapshot(q, (s) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                s.docs.reverse().forEach(doc => {
                    const m = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.uid === user.uid ? 'msg-mine' : 'msg-theirs'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });

            document.getElementById('btn-send').onclick = async () => {
                const t = document.getElementById('chat-in').value;
                if(!t) return;
                document.getElementById('chat-in').value = "";
                await addDoc(collection(db, "messages"), { text: t, uid: user.uid, createdAt: serverTimestamp() });
                await updateDoc(userRef, { points: increment(2) });
                sync();
            };

            // PFP Upload
            document.getElementById('pfp-up').onchange = async (e) => {
                const file = e.target.files[0];
                const sRef = ref(storage, `pfps/${user.uid}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                await updateDoc(userRef, { pfpUrl: url });
                sync();
            };

            document.getElementById('btn-logout').onclick = () => signOut(auth);

            sync();
        });
    </script>
</body>
</html>
