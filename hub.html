<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .app-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.05); }
        .interest-chip { padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .interest-chip.selected { background: #d946ef; border-color: #d946ef; color: white; }
        .user-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 15px; margin-bottom: 8px; background: rgba(255,255,255,0.02); }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="p-6 flex justify-between items-center app-card">
        <div>
            <h1 class="text-xl font-black italic text-fuchsia-600">SOCIALIZE</h1>
            <p id="ui-points" class="text-yellow-500 font-bold text-[10px] tracking-widest uppercase">0 SP</p>
        </div>
        <div id="status-light" class="flex items-center gap-2 text-[10px] font-bold text-zinc-500">
            <div class="online-dot"></div> ONLINE
        </div>
    </div>

    <div id="main-content" class="flex-1 overflow-y-auto p-6">
        
        <div id="view-chat" class="space-y-6">
            <div class="space-y-3">
                <h3 class="text-[10px] font-black uppercase text-zinc-500">Your Interests</h3>
                <div id="interests-box" class="flex flex-wrap gap-2">
                    <div class="interest-chip" onclick="toggleInterest(this, 'Gaming')">Gaming</div>
                    <div class="interest-chip" onclick="toggleInterest(this, 'Music')">Music</div>
                    <div class="interest-chip" onclick="toggleInterest(this, 'Coding')">Coding</div>
                    <div class="interest-chip" onclick="toggleInterest(this, 'Anime')">Anime</div>
                    <div class="interest-chip" onclick="toggleInterest(this, 'Sports')">Sports</div>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black uppercase text-zinc-500">Users Online</h3>
                    <button onclick="refreshUsers()" class="material-icons text-sm text-zinc-500">refresh</button>
                </div>
                <div id="users-list" class="space-y-2">
                    </div>
            </div>
        </div>

        <div id="view-arcade" class="hidden">Arcade Content Here...</div>
        <div id="view-settings" class="hidden">Settings Content Here...</div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 app-card border-t flex justify-around p-4 pb-8 z-50">
        <button onclick="tab('chat')" id="tab-chat" class="text-fuchsia-500"><span class="material-icons">forum</span></button>
        <button onclick="tab('arcade')" id="tab-arcade" class="text-zinc-600"><span class="material-icons">sports_esports</span></button>
        <button onclick="tab('settings')" id="tab-settings" class="text-zinc-600"><span class="material-icons">settings</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM", authDomain: "socialize-614d2.firebaseapp.com", projectId: "socialize-614d2", storageBucket: "socialize-614d2.firebasestorage.app", messagingSenderId: "506436447388", appId: "1:506436447388:web:c8d876b69ed57048981159" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myInterests = [];
        let currentUser = null;

        // Interest Toggling
        window.toggleInterest = async (el, name) => {
            el.classList.toggle('selected');
            if(myInterests.includes(name)) myInterests = myInterests.filter(i => i !== name);
            else myInterests.push(name);
            
            if(currentUser) {
                await updateDoc(doc(db, "users", currentUser.uid), { interests: myInterests });
                refreshUsers();
            }
        };

        // Real-Time Matchmaking
        window.refreshUsers = async () => {
            const list = document.getElementById('users-list');
            list.innerHTML = `<p class="text-[10px] text-zinc-600 text-center py-4">Scanning for matches...</p>`;

            const q = query(collection(db, "users"), where("status", "==", "online"));
            const snap = await getDocs(q);
            
            let users = [];
            snap.forEach(d => {
                if(d.id !== currentUser.uid) {
                    const data = d.data();
                    // Calculate similarity score
                    let score = 0;
                    if(data.interests) {
                        score = data.interests.filter(i => myInterests.includes(i)).length;
                    }
                    users.push({ id: d.id, ...data, score });
                }
            });

            // Sort: highest interest score first
            users.sort((a, b) => b.score - a.score);

            list.innerHTML = users.length ? "" : `<p class="text-[10px] text-zinc-600 text-center py-4">No one else is online. Invite a friend!</p>`;

            users.forEach(u => {
                const div = document.createElement('div');
                div.className = "user-row app-card";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${u.pfpUrl || 'https://api.dicebear.com/7.x/shapes/svg?seed='+u.id}" class="w-10 h-10 rounded-xl bg-zinc-800">
                        <div>
                            <p class="text-xs font-bold flex items-center gap-1">
                                ${u.name} ${u.isVerified ? '<span class="material-icons text-blue-500 text-[10px]">verified</span>' : ''}
                            </p>
                            <p class="text-[9px] text-fuchsia-500 font-bold">${u.score} Common Interests</p>
                        </div>
                    </div>
                    <button onclick="startChat('${u.id}')" class="bg-white text-black text-[9px] px-4 py-2 rounded-lg font-black uppercase">Chat</button>
                `;
                list.appendChild(div);
            });
        };

        onAuthStateChanged(auth, async (user) => {
            if(!user) return window.location.href = 'index.html';
            currentUser = user;

            const userRef = doc(db, "users", user.uid);
            
            // Set status to online
            await setDoc(userRef, { 
                status: "online", 
                lastActive: serverTimestamp(),
                name: user.displayName || user.email.split('@')[0]
            }, { merge: true });

            // Load my interests
            const snap = await getDoc(userRef);
            if(snap.exists() && snap.data().interests) {
                myInterests = snap.data().interests;
                document.querySelectorAll('.interest-chip').forEach(chip => {
                    if(myInterests.includes(chip.innerText)) chip.classList.add('selected');
                });
            }

            refreshUsers();
            
            // UI Points Sync
            onSnapshot(userRef, (s) => {
                document.getElementById('ui-points').innerText = (s.data()?.points || 0) + " SP";
            });
        });

        window.startChat = (targetId) => {
            // This would redirect to a specific chat room ID
            alert("Connecting to chat with ID: " + targetId);
        };
    </script>
</body>
</html>
