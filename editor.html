<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-zinc-900 p-10 rounded-[3rem] border border-zinc-800">
        <h1 class="text-3xl font-black italic text-fuchsia-600 mb-8 text-center uppercase tracking-tighter">Edit Identity</h1>
        
        <div class="space-y-6">
            <p class="text-[10px] text-zinc-500 font-bold text-center uppercase tracking-widest italic">Note: Your Google PFP is used automatically</p>
            
            <div>
                <label class="text-[10px] uppercase font-bold text-zinc-600 ml-2">Unique Username</label>
                <input type="text" id="edit-name" placeholder="Choose a name..." 
                    class="w-full bg-black border border-zinc-800 rounded-2xl p-4 mt-1 focus:border-fuchsia-600 outline-none transition">
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-zinc-600 ml-2">Bio</label>
                <textarea id="edit-bio" rows="3" placeholder="Tell the world..." 
                    class="w-full bg-black border border-zinc-800 rounded-2xl p-4 mt-1 focus:border-fuchsia-600 outline-none transition"></textarea>
            </div>

            <button id="save-btn" class="w-full bg-fuchsia-600 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-fuchsia-500 transition">
                Save Profile
            </button>
        </div>

        <div id="share-section" class="mt-10 pt-10 border-t border-zinc-800 hidden">
            <p class="text-center text-fuchsia-500 text-[10px] font-bold uppercase mb-4">Your Link is Live!</p>
            <div id="share-url" class="bg-black p-4 rounded-xl font-mono text-[10px] text-center text-zinc-400 border border-zinc-800"></div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
