<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --bg: #080808; --card: #121212; --text: #ffffff; --border: rgba(255,255,255,0.1); }
        .light-mode { --bg: #f4f4f5; --card: #ffffff; --text: #09090b; --border: rgba(0,0,0,0.1); }
        
        body { background: var(--bg); color: var(--text); transition: all 0.3s ease; }
        .app-card { background: var(--card); border: 1px solid var(--border); }
        .tab-active { color: #d946ef !important; border-top: 2px solid #d946ef; }

        /* WHEEL */
        .wheel-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto; }
        .wheel-inner { 
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--border);
            background: conic-gradient(#d946ef 0deg 90deg, #111 90deg 180deg, #d946ef 180deg 270deg, #111 270deg 355deg, #ffd700 355deg 360deg);
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #d946ef; z-index: 20; }
        
        /* FRAMES */
        .frame-none { border: 4px solid transparent; }
        .frame-neon { border: 4px solid #d946ef; box-shadow: 0 0 15px #d946ef; }
        .frame-gold { border: 4px solid #fbbf24; box-shadow: 0 0 15px #fbbf24; }
    </style>
</head>
<body class="pb-28">

    <div class="p-6 flex justify-between items-center app-card border-b sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-black italic text-fuchsia-600 uppercase">Socialize</h1>
            <p id="ui-points" class="text-yellow-500 font-bold text-[10px] tracking-widest">0 SP</p>
        </div>
        <button id="btn-link" class="bg-fuchsia-600 text-white text-[10px] font-black px-5 py-2 rounded-full uppercase">Your Link</button>
    </div>

    <div class="p-6 max-w-md mx-auto space-y-8">

        <div class="app-card rounded-2xl p-6 text-center shadow-xl">
            <div class="relative w-24 h-24 mx-auto mb-4">
                <img id="prev-img" src="" class="w-full h-full object-cover rounded-lg frame-none">
            </div>
            <h3 id="prev-name" class="text-xl font-bold italic"></h3>
            <p id="prev-title" class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mt-1"></p>
        </div>

        <div id="sec-profile" class="app-sec space-y-4">
            <h2 class="font-bold uppercase text-xs text-zinc-500">Identity</h2>
            <input type="text" id="in-name" placeholder="Name" class="w-full bg-transparent border border-white/10 p-4 rounded-xl">
            <textarea id="in-bio" placeholder="Bio" class="w-full bg-transparent border border-white/10 p-4 rounded-xl" rows="2"></textarea>
            
            <h2 class="font-bold uppercase text-xs text-zinc-500 mt-6">Equip Items</h2>
            <div class="grid grid-cols-2 gap-2" id="inventory-list">
                </div>
            
            <button id="btn-save" class="w-full bg-fuchsia-600 text-white py-4 rounded-xl font-black uppercase mt-4">Save Profile</button>
        </div>

        <div id="sec-spin" class="app-sec hidden text-center space-y-6">
            <div class="wheel-wrap">
                <div class="pointer"></div>
                <div id="wheel-obj" class="wheel-inner"></div>
            </div>
            <button id="btn-spin" class="w-full bg-fuchsia-600 py-5 rounded-2xl font-black uppercase">Spin for 100 SP</button>
        </div>

        <div id="sec-shop" class="app-sec hidden space-y-4">
            <h2 class="text-xl font-black uppercase italic mb-4">The Bazaar</h2>
            <div id="shop-items" class="space-y-3">
                </div>
        </div>

        <div id="sec-settings" class="app-sec hidden space-y-4">
            <div class="app-card p-4 rounded-xl flex justify-between items-center">
                <span class="font-bold text-xs uppercase">Light Mode</span>
                <input type="checkbox" id="toggle-light" class="w-10 h-5 accent-fuchsia-600">
            </div>
            <button id="btn-logout" class="w-full p-4 rounded-xl border border-zinc-500 font-bold uppercase text-xs">Logout</button>
            <button id="btn-delete" class="w-full p-4 rounded-xl border border-red-900 text-red-500 font-bold uppercase text-xs">Delete Account</button>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 app-card border-t flex justify-around p-4 pb-8 z-50">
        <button id="nav-profile" class="tab-link tab-active flex flex-col items-center"><span class="material-icons">person</span></button>
        <button id="nav-spin" class="tab-link text-zinc-500 flex flex-col items-center"><span class="material-icons">casino</span></button>
        <button id="nav-shop" class="tab-link text-zinc-500 flex flex-col items-center"><span class="material-icons">shopping_bag</span></button>
        <button id="nav-settings" class="tab-link text-zinc-500 flex flex-col items-center"><span class="material-icons">settings</span></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNl7BW60B6GrHrGx02QaiUbZU3Z3oYlXM",
            authDomain: "socialize-614d2.firebaseapp.com",
            projectId: "socialize-614d2",
            storageBucket: "socialize-614d2.firebasestorage.app",
            messagingSenderId: "506436447388",
            appId: "1:506436447388:web:c8d876b69ed57048981159"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SHOP_DATA = [
            { id: 'frame-neon', name: 'Neon Frame', price: 500, type: 'frame' },
            { id: 'frame-gold', name: 'Gold Frame', price: 2000, type: 'frame' },
            { id: 'title-rich', name: 'The Rich', price: 1000, type: 'title' },
            { id: 'title-og', name: 'Socialize OG', price: 5000, type: 'title' }
        ];

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.href = 'index.html';
            const userRef = doc(db, "users", user.uid);
            
            // --- LOAD DATA ---
            const syncUI = async () => {
                const snap = await getDoc(userRef);
                const data = snap.data();
                
                document.getElementById('ui-points').innerText = `${data.points || 0} SP`;
                document.getElementById('in-name').value = data.name || "";
                document.getElementById('in-bio').value = data.bio || "";
                
                // Update Preview
                document.getElementById('prev-name').innerText = data.name || user.displayName;
                document.getElementById('prev-img').src = user.photoURL;
                document.getElementById('prev-img').className = `w-full h-full object-cover rounded-lg ${data.equippedFrame || 'frame-none'}`;
                document.getElementById('prev-title').innerText = data.equippedTitle || "";

                // Inventory UI
                const invDiv = document.getElementById('inventory-list');
                invDiv.innerHTML = "";
                (data.inventory || []).forEach(itemId => {
                    const btn = document.createElement('button');
                    btn.className = "p-2 text-[9px] bg-zinc-800 rounded uppercase font-bold";
                    btn.innerText = `Equip ${itemId.replace('title-', '').replace('frame-', '')}`;
                    btn.onclick = async () => {
                        const field = itemId.includes('frame') ? 'equippedFrame' : 'equippedTitle';
                        await updateDoc(userRef, { [field]: itemId });
                        syncUI();
                    };
                    invDiv.appendChild(btn);
                });
            };
            syncUI();

            // --- SHOP LOGIC ---
            const shopDiv = document.getElementById('shop-items');
            SHOP_DATA.forEach(item => {
                const row = document.createElement('div');
                row.className = "app-card p-4 rounded-xl flex justify-between items-center";
                row.innerHTML = `<div><p class="text-xs font-bold uppercase">${item.name}</p></div>`;
                const btn = document.createElement('button');
                btn.className = "bg-fuchsia-600 px-4 py-2 rounded-lg text-[10px] font-black";
                btn.innerText = `${item.price} SP`;
                btn.onclick = async () => {
                    const d = (await getDoc(userRef)).data();
                    if(d.points < item.price) return alert("Broke!");
                    await updateDoc(userRef, { points: increment(-item.price), inventory: arrayUnion(item.id) });
                    syncUI();
                };
                row.appendChild(btn);
                shopDiv.appendChild(row);
            });

            // --- SETTINGS ---
            document.getElementById('toggle-light').onchange = (e) => {
                document.body.classList.toggle('light-mode', e.target.checked);
            };

            document.getElementById('btn-logout').onclick = () => signOut(auth);
            document.getElementById('btn-delete').onclick = async () => {
                if(confirm("Delete everything?")) {
                    await deleteDoc(userRef);
                    deleteUser(auth.currentUser);
                }
            };

            // --- SPIN ---
            document.getElementById('btn-spin').onclick = async () => {
                const wheel = document.getElementById('wheel-obj');
                const deg = 3600 + Math.random() * 360;
                wheel.style.transform = `rotate(${deg}deg)`;
                setTimeout(async () => {
                    await updateDoc(userRef, { points: increment(50) });
                    syncUI();
                }, 5000);
            };

            // --- TABS ---
            const sections = { 'nav-profile': 'sec-profile', 'nav-spin': 'sec-spin', 'nav-shop': 'sec-shop', 'nav-settings': 'sec-settings' };
            Object.keys(sections).forEach(key => {
                document.getElementById(key).onclick = () => {
                    document.querySelectorAll('.app-sec').forEach(s => s.classList.add('hidden'));
                    document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('tab-active'));
                    document.getElementById(sections[key]).classList.remove('hidden');
                    document.getElementById(key).classList.add('tab-active');
                };
            });

            document.getElementById('btn-save').onclick = async () => {
                await updateDoc(userRef, { name: document.getElementById('in-name').value, bio: document.getElementById('in-bio').value });
                alert("Saved!");
            };

            document.getElementById('btn-link').onclick = () => {
                prompt("Copy your link:", `${window.location.origin}/profile.html?u=${user.uid}`);
            };
        });
    </script>
</body>
</html>
