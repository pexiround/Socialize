<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Socialize | Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-6 flex justify-center items-center min-h-screen">
    <div class="max-w-md w-full bg-zinc-900 p-10 rounded-[3rem] border border-zinc-800">
        <h1 class="text-2xl font-black text-fuchsia-600 mb-8 text-center italic">CONFIG YOUR IDENTITY</h1>
        
        <div class="space-y-4">
            <input type="text" id="edit-name" placeholder="Name" class="w-full bg-black border border-zinc-800 rounded-2xl p-4">
            <textarea id="edit-bio" placeholder="Bio" class="w-full bg-black border border-zinc-800 rounded-2xl p-4"></textarea>
            <input type="text" id="edit-ig" placeholder="Instagram Username (no @)" class="w-full bg-black border border-zinc-800 rounded-2xl p-4">
            
            <select id="theme-select" class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-zinc-400">
                <option value="theme-midnight">Midnight Black</option>
                <option value="theme-neon">Neon Fuchsia</option>
                <option value="theme-glass">Cyber Purple</option>
            </select>

            <button id="save-btn" class="w-full bg-fuchsia-600 py-5 rounded-2xl font-black uppercase">Sync Profile</button>
        </div>

        <div id="share-section" class="mt-8 hidden p-4 bg-black rounded-xl border border-zinc-800 text-center">
            <p class="text-[9px] text-zinc-500 mb-2 font-bold uppercase">Your Link</p>
            <div id="share-url" class="text-[10px] font-mono text-fuchsia-500 break-all"></div>
        </div>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
