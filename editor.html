<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-[#0b0b0b] text-white font-sans min-h-screen pb-24">

    <div class="p-6 flex justify-between items-center border-b border-white/5 bg-[#121212] sticky top-0 z-50">
        <h1 class="text-xl font-black italic text-fuchsia-600 tracking-tighter uppercase">Socialize</h1>
        <div class="flex items-center gap-4">
            <span id="user-points" class="text-yellow-500 font-bold text-sm">0 SP</span>
            <a id="view-link-btn" href="#" target="_blank" class="bg-fuchsia-600 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-widest">Your Link</a>
        </div>
    </div>

    <div class="p-6 max-w-md mx-auto">
        
        <div id="cat-profile" class="editor-category space-y-6">
            <h2 class="text-2xl font-bold">Edit Identity</h2>
            <div>
                <label class="text-[10px] text-zinc-500 font-bold uppercase">Display Name</label>
                <input type="text" id="edit-name" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-xl mt-2">
            </div>
            <div>
                <label class="text-[10px] text-zinc-500 font-bold uppercase">Biography</label>
                <textarea id="edit-bio" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-xl mt-2" rows="3"></textarea>
            </div>
            <button id="save-btn" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase">Save Profile</button>
        </div>

        <div id="cat-spin" class="editor-category hidden text-center space-y-8 py-10">
            <div class="w-48 h-48 bg-fuchsia-600/10 border-4 border-fuchsia-600 rounded-full mx-auto flex items-center justify-center animate-pulse">
                <span class="material-icons text-6xl text-fuchsia-600">casino</span>
            </div>
            <div>
                <h2 class="text-2xl font-bold">Hourly Spin</h2>
                <p class="text-zinc-500 text-sm mt-2">Win SP and exclusive exotic frames.</p>
            </div>
            <button onclick="spinWheel()" class="w-full bg-fuchsia-600 py-5 rounded-2xl font-black uppercase shadow-lg shadow-fuchsia-900/40">Spin Now</button>
        </div>

        <div id="cat-shop" class="editor-category hidden space-y-4">
            <h2 class="text-2xl font-bold mb-6">Point Shop</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 p-4 rounded-2xl border border-white/5 text-center">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-full mx-auto mb-3"></div>
                    <p class="text-xs font-bold uppercase">Neon Frame</p>
                    <button class="mt-3 text-[10px] bg-white/10 px-3 py-1 rounded">500 SP</button>
                </div>
                <div class="bg-zinc-900 p-4 rounded-2xl border border-white/5 text-center">
                    <div class="w-12 h-12 bg-yellow-500/20 rounded-full mx-auto mb-3"></div>
                    <p class="text-xs font-bold uppercase">Gold Border</p>
                    <button class="mt-3 text-[10px] bg-white/10 px-3 py-1 rounded">1.2k SP</button>
                </div>
            </div>
        </div>

        <div id="cat-settings" class="editor-category hidden space-y-6">
            <h2 class="text-2xl font-bold">Settings</h2>
            <div class="bg-zinc-900 p-4 rounded-2xl flex justify-between items-center">
                <span class="text-sm">Public Visibility</span>
                <div class="w-10 h-5 bg-fuchsia-600 rounded-full"></div>
            </div>
            <button onclick="auth.signOut().then(()=>location.href='index.html')" class="w-full border border-red-500/50 text-red-500 py-4 rounded-xl font-bold">Sign Out</button>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#121212] border-t border-white/5 flex justify-around p-4 pb-8 z-50">
        <button onclick="showCategory('cat-profile')" class="tab-btn flex flex-col items-center gap-1">
            <span class="material-icons text-xl">person</span>
            <span class="text-[9px] uppercase font-bold">Profile</span>
        </button>
        <button onclick="showCategory('cat-spin')" class="tab-btn flex flex-col items-center gap-1">
            <span class="material-icons text-xl">auto_fix_high</span>
            <span class="text-[9px] uppercase font-bold">Spin</span>
        </button>
        <button onclick="showCategory('cat-shop')" class="tab-btn flex flex-col items-center gap-1 text-zinc-600">
            <span class="material-icons text-xl">shopping_bag</span>
            <span class="text-[9px] uppercase font-bold">Shop</span>
        </button>
        <button onclick="showCategory('cat-settings')" class="tab-btn flex flex-col items-center gap-1 text-zinc-600">
            <span class="material-icons text-xl">settings</span>
            <span class="text-[9px] uppercase font-bold">Settings</span>
        </button>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
