<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Socialize Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-10">
    <div class="max-w-lg mx-auto glass p-8 rounded-3xl border border-zinc-800">
        <h2 class="text-2xl font-bold mb-6">Edit Your Profile</h2>
        
        <div class="space-y-4">
            <input id="edit-name" type="text" placeholder="Display Name" class="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800">
            <textarea id="edit-bio" placeholder="Short Bio" class="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800"></textarea>
            
            <div id="link-inputs" class="space-y-2">
                <p class="text-xs text-zinc-500 uppercase font-bold">Your Links</p>
                </div>
            
            <button id="save-btn" class="w-full bg-fuchsia-600 py-4 rounded-xl font-bold">SAVE PROFILE</button>
        </div>
        <p id="share-url" class="mt-6 text-center text-fuchsia-400 text-sm font-mono"></p>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
