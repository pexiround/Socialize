<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socialize | Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white p-6 flex justify-center items-center min-h-screen font-sans">
    <div class="w-full max-w-md bg-zinc-900/50 p-10 rounded-[3rem] border border-zinc-800 backdrop-blur-md">
        <h1 class="text-2xl font-black text-fuchsia-600 mb-8 text-center italic uppercase">Config Identity</h1>
        
        <div class="space-y-5">
            <input type="text" id="edit-name" placeholder="Unique Username" class="w-full bg-black border border-zinc-800 rounded-2xl p-5 outline-none focus:border-fuchsia-600 transition">
            <textarea id="edit-bio" rows="3" placeholder="Bio" class="w-full bg-black border border-zinc-800 rounded-2xl p-5 outline-none focus:border-fuchsia-600 transition"></textarea>
            
            <select id="theme-select" class="w-full bg-black border border-zinc-800 rounded-2xl p-5 text-zinc-400 outline-none">
                <option value="theme-midnight">Midnight Black</option>
                <option value="theme-neon">Neon Glow</option>
                <option value="theme-glass">Cyber Purple</option>
            </select>

            <button id="save-btn" class="w-full bg-fuchsia-600 py-6 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-fuchsia-900/20 active:scale-95 transition">Sync Profile</button>
        </div>

        <div id="share-section" class="mt-10 hidden p-6 bg-black rounded-[2rem] border border-zinc-800 text-center animate-bounce-short">
            <p class="text-[9px] text-zinc-500 mb-2 font-black uppercase tracking-widest">Your Live Identity</p>
            <div id="share-url" class="text-[10px] font-mono text-fuchsia-500 break-all"></div>
        </div>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
