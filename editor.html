<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0b0b] text-white p-6 flex justify-center items-center min-h-screen">
    <div class="w-full max-w-md bg-[#171a21] p-8 rounded-lg border border-white/10">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-fuchsia-600 font-black text-xl italic uppercase">Editor</h1>
                <p id="user-level" class="text-[10px] text-blue-400 font-bold"></p>
            </div>
            <div class="text-right">
                <p id="user-points" class="text-xl font-black text-yellow-500">0 SP</p>
                <button onclick="spinWheel()" class="text-[9px] bg-white/10 px-2 py-1 rounded mt-1 hover:bg-white/20">LUCKY SPIN</button>
            </div>
        </div>

        <div class="space-y-4">
            <label class="text-xs text-zinc-500 font-bold uppercase">Display Name</label>
            <input type="text" id="edit-name" class="w-full bg-black/50 border border-white/10 p-4 rounded">
            
            <label class="text-xs text-zinc-500 font-bold uppercase">Profile Bio</label>
            <textarea id="edit-bio" class="w-full bg-black/50 border border-white/10 p-4 rounded" rows="3"></textarea>
            
            <button id="save-btn" class="w-full bg-fuchsia-600 py-4 rounded font-bold hover:bg-fuchsia-700 transition active:scale-95">SYNC TO CLOUD</button>
        </div>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
