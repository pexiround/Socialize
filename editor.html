<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialize | Manage Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center p-6 font-sans">

    <div class="max-w-md w-full bg-zinc-900 p-8 rounded-[2.5rem] border border-zinc-800 shadow-2xl">
        <h1 class="text-3xl font-black italic text-fuchsia-600 mb-2 text-center">MANAGE PROFILE</h1>
        <p class="text-zinc-500 text-[10px] text-center uppercase tracking-widest mb-8 font-bold">Update your digital identity</p>
        
        <div class="space-y-5">
            <div>
                <label class="text-[10px] uppercase font-black text-zinc-500 ml-2">Display Name</label>
                <input type="text" id="edit-name" placeholder="Your Name" 
                    class="w-full bg-black border border-zinc-800 rounded-2xl p-4 focus:outline-none focus:border-fuchsia-600 transition">
            </div>

            <div>
                <label class="text-[10px] uppercase font-black text-zinc-500 ml-2">Your Bio</label>
                <textarea id="edit-bio" rows="4" placeholder="Tell your story..." 
                    class="w-full bg-black border border-zinc-800 rounded-2xl p-4 focus:outline-none focus:border-fuchsia-600 transition"></textarea>
            </div>

            <button id="save-btn" class="w-full bg-fuchsia-600 text-white font-black py-5 rounded-2xl hover:bg-fuchsia-500 transition-all shadow-lg shadow-fuchsia-900/20">
                SAVE CHANGES
            </button>
        </div>

        <div id="share-section" class="mt-10 pt-8 border-t border-zinc-800 text-center hidden">
            <p class="text-fuchsia-500 text-[10px] font-black uppercase mb-3 tracking-widest">Your Live Link</p>
            <div id="share-url" class="bg-black p-4 rounded-xl text-white font-mono text-[10px] break-all border border-zinc-800 mb-2"></div>
            <p class="text-zinc-600 text-[9px]">Share this link in your social bios!</p>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
