<script type="module">
    // ... (Standard Imports & Firebase Init)

    async function startMatchmaking(myData) {
        const matchCard = document.getElementById('match-name');
        const matchStats = document.getElementById('match-stats');
        
        // Search for real peers
        const q = query(collection(db, "users"), 
            where("interests", "array-contains-any", myData.interests),
            limit(10)
        );
        
        const snap = await getDocs(q);
        const peers = snap.docs.filter(d => d.id !== auth.currentUser.uid);

        if (peers.length > 0) {
            // Found someone!
            const peer = peers[Math.floor(Math.random() * peers.length)].data();
            matchCard.innerText = peer.name;
            matchStats.innerText = `${peer.country} • Matching Interests`;
        } else {
            // NO ONE FOUND: Enter "Ghost Mode"
            matchCard.innerText = "The Void";
            matchStats.innerText = "No peers online. Talking here still earns SP.";
            
            // Add a ghost message
            const chatBox = document.getElementById('chat-box');
            const ghostMsg = document.createElement('div');
            ghostMsg.className = "msg msg-theirs italic opacity-50";
            ghostMsg.innerHTML = "SYSTEM: You are currently alone in this frequency. Points are still active.";
            chatBox.appendChild(ghostMsg);
        }
    }
</script>
